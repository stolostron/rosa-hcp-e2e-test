# Version Compatibility and Validation Rules

# Supported OpenShift versions
supported_versions:
  - "4.18"
  - "4.19"
  - "4.20"
  - "4.21"
  - "4.22"

# Default version if none specified
default_version: "4.22"

# Version validation rules
validation_rules:
  version_format: "^4\\.(1[8-9]|2[0-2])$"
  min_supported: "4.18"
  max_supported: "4.22"

# Template path patterns
template_paths:
  version_specific: "templates/versions/{{ openshift_version }}"
  common: "templates/common"
  schemas: "templates/schemas"

# Feature availability by version
feature_availability:
  private_network:
    min_version: "4.19"
    max_version: null
  byon:
    min_version: "4.19"
    max_version: null
  no_cni:
    min_version: "4.19"
    max_version: null
  external_oidc:
    min_version: "4.19"
    max_version: null
  image_registry:
    min_version: "4.19"
    max_version: null
  disk_size:
    min_version: "4.19"
    max_version: null
  parallel_upgrade:
    min_version: "4.19"
    max_version: null
  cluster_autoscaler_expander:
    min_version: "4.19"
    max_version: null
  etcd_kms:
    min_version: "4.19"
    max_version: null
  security_groups:
    min_version: "4.19"
    max_version: null
  proxy_enabled:
    min_version: "4.19"
    max_version: null
  audit_logging:
    min_version: "4.20"
    max_version: null
  fips:
    min_version: "4.21"
    max_version: null
  user_agent:
    min_version: "4.19"
    max_version: null
  additional_tags:
    min_version: "4.18"
    max_version: null
  availability_zones:
    min_version: "4.18"
    max_version: null
  channel_group:
    min_version: "4.18"
    max_version: null
  domain_prefix:
    min_version: "4.18"
    max_version: null
  basic_networking:
    min_version: "4.18"
    max_version: "4.19"
    deprecated_in: "4.20"

# Resource requirements by version
resource_requirements:
  "4.18":
    min_nodes: 2
    min_vcpu: 4
    min_memory: "8Gi"
    min_storage: "100Gi"
  "4.19":
    min_nodes: 2
    min_vcpu: 4
    min_memory: "8Gi"
    min_storage: "120Gi"
  "4.20":
    min_nodes: 3
    min_vcpu: 8
    min_memory: "16Gi"
    min_storage: "200Gi"
  "4.21":
    min_nodes: 3
    min_vcpu: 8
    min_memory: "16Gi"
    min_storage: "200Gi"
  "4.22":
    min_nodes: 3
    min_vcpu: 8
    min_memory: "16Gi"
    min_storage: "200Gi"

# Deprecation warnings
deprecation_warnings:
  "4.18":
    - "OpenShift 4.18 will reach end of support soon"
    - "Consider upgrading to 4.19 for latest features"
  "4.19":
    - "Some legacy features deprecated in favor of 4.20 equivalents"
  "4.20": []
  "4.21": []
  "4.22": []
