---
- name: Set default variables for diagnosis
  set_fact:
    capi_namespace: "{{ capi_namespace | default('ns-rosa-hcp') }}"
    capa_system_namespace: "{{ capa_system_namespace | default('multicluster-engine') }}"

- name: Skip diagnosis if no 403 detected
  debug:
    msg: "Skipping 403 diagnosis - no break_glass_403_detected flag found"
  when: not (break_glass_403_detected | default(false) | bool)

- name: Perform 403 diagnostics
  block:
    - name: Check OCM token validity
      shell: |
        ocm whoami
      register: ocm_whoami_result
      failed_when: false
      changed_when: false

    - name: Parse OCM identity information
      set_fact:
        ocm_identity: "{{ ocm_whoami_result.stdout | from_json }}"
        ocm_email: "{{ (ocm_whoami_result.stdout | from_json).email | default('unknown') }}"
        ocm_organization_id: "{{ (ocm_whoami_result.stdout | from_json).organization.id | default('unknown') }}"
      when: ocm_whoami_result.rc == 0

    - name: Check cluster's limited support status
      shell: |
        ocm get /api/clusters_mgmt/v1/clusters/"{{ cluster_id }}"/limited_support_reasons
      register: limited_support_result
      failed_when: false
      changed_when: false

    - name: Parse limited support information
      set_fact:
        limited_support_reasons: "{{ (limited_support_result.stdout | from_json).items | default([]) if limited_support_result.rc == 0 else [] }}"
        cluster_in_limited_support: "{{ ((limited_support_result.stdout | from_json).items | default([]) | length > 0) if limited_support_result.rc == 0 else false }}"

    - name: Check external auth configuration from cluster info
      set_fact:
        cluster_external_auth_status: "{{ cluster_info.external_auth_config.enabled | default(cluster_info.external_authentication.enabled | default('unknown')) }}"
      when: cluster_info is defined

    - name: List all secrets in CAPI namespace matching cluster
      shell: |
        oc get secrets -n "{{ capi_namespace }}" --no-headers 2>/dev/null | grep -F '{{ cluster_name }}'
      register: cluster_secrets_result
      failed_when: false
      changed_when: false
      when: cluster_name is defined and cluster_name != ""

    - name: Parse cluster secrets inventory
      set_fact:
        cluster_secrets_list: "{{ cluster_secrets_result.stdout_lines | default([]) }}"
        kubeconfig_secret_found: "{{ cluster_secrets_result.stdout | regex_search(cluster_name + '-kubeconfig') | default('') != '' }}"
        bootstrap_kubeconfig_secret_found: "{{ cluster_secrets_result.stdout | regex_search(cluster_name + '-bootstrap-kubeconfig') | default('') != '' }}"
      when: cluster_secrets_result is defined

    - name: Check secret ages if they exist
      shell: |
        oc get secret "{{ cluster_name }}-kubeconfig" -n "{{ capi_namespace }}" -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null
      register: kubeconfig_secret_age
      failed_when: false
      changed_when: false
      when: 
        - cluster_name is defined
        - kubeconfig_secret_found | default(false)

    - name: Check bootstrap secret age if it exists
      shell: |
        oc get secret "{{ cluster_name }}-bootstrap-kubeconfig" -n "{{ capi_namespace }}" -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null
      register: bootstrap_secret_age
      failed_when: false
      changed_when: false
      when: 
        - cluster_name is defined
        - bootstrap_kubeconfig_secret_found | default(false)

    - name: Check OCM account role for break-glass permissions
      shell: |
        ROLE_BINDINGS=$(ocm get /api/accounts_mgmt/v1/role_bindings --parameter search="account.id='$(ocm whoami --json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)'" 2>/dev/null)
        if [ $? -ne 0 ] || [ -z "$ROLE_BINDINGS" ]; then
          echo "ROLE_CHECK_FAILED"
          exit 0
        fi
        echo "$ROLE_BINDINGS" | python3 -c "
import sys, json
data = json.load(sys.stdin)
roles = [item.get('role',{}).get('id','') for item in data.get('items',[])]
has_owner = any('ClusterOwner' in r or 'cluster_owner' in r for r in roles)
has_dev = any('ClusterServiceDeveloper' in r or 'cluster_service_developer' in r for r in roles)
print(f'has_cluster_owner={has_owner}')
print(f'has_cluster_service_developer={has_dev}')
print(f'roles={",".join(roles)}')
" 2>/dev/null || echo "ROLE_PARSE_FAILED"
      register: ocm_role_check_result
      failed_when: false
      changed_when: false

    - name: Parse OCM role check results
      set_fact:
        ocm_has_cluster_owner: "{{ 'has_cluster_owner=True' in (ocm_role_check_result.stdout | default('')) }}"
        ocm_has_cluster_service_developer: "{{ 'has_cluster_service_developer=True' in (ocm_role_check_result.stdout | default('')) }}"
        ocm_has_break_glass_permission: "{{ 'has_cluster_owner=True' in (ocm_role_check_result.stdout | default('')) or 'has_cluster_service_developer=True' in (ocm_role_check_result.stdout | default('')) }}"
        ocm_role_check_failed: "{{ 'ROLE_CHECK_FAILED' in (ocm_role_check_result.stdout | default('')) or 'ROLE_PARSE_FAILED' in (ocm_role_check_result.stdout | default('')) }}"

    - name: Check CAPA controller logs for break-glass errors
      shell: |
        oc logs deploy/capa-controller-manager -n "{{ capa_system_namespace }}" --tail=100 2>/dev/null | grep -i 'break.glass\|forbidden\|403'
      register: capa_logs_result
      failed_when: false
      changed_when: false

    - name: Build comprehensive diagnostic report
      debug:
        msg: |
          
          ========================================
          BREAK-GLASS 403 DIAGNOSTIC REPORT
          ========================================
          
          CLUSTER INFORMATION:
          - Cluster ID: {{ cluster_id }}
          - Cluster Name: {{ cluster_name | default('unknown') }}
          - Cluster State: {{ cluster_state | default('unknown') }}
          - External Auth Enabled: {{ cluster_external_auth_status | default('unknown') }}
          - Limited Support: {{ 'YES (' + (limited_support_reasons | length | string) + ' reasons)' if cluster_in_limited_support else 'NO' }}
          
          OCM IDENTITY INFORMATION:
          - OCM Token Valid: {{ 'YES' if ocm_whoami_result.rc == 0 else 'NO' }}
          - OCM Email: {{ (ocm_email | default('unknown'))[:3] + '***' if ocm_email is defined and ocm_email != 'unknown' else 'unknown' }}
          - OCM Organization ID: {{ (ocm_organization_id | default('unknown'))[:8] + '...' if ocm_organization_id is defined and ocm_organization_id != 'unknown' else 'unknown' }}
          
          PROVISIONER SECRET INVENTORY:
          - CAPI Namespace: {{ capi_namespace }}
          - Cluster Secrets Found: {{ cluster_secrets_list | length | default(0) }}
          - Kubeconfig Secret: {{ 'EXISTS' if kubeconfig_secret_found | default(false) else 'MISSING' }}{% if kubeconfig_secret_age.stdout is defined %} (created: {{ kubeconfig_secret_age.stdout }}){% endif %}
          - Bootstrap Kubeconfig Secret: {{ 'EXISTS' if bootstrap_kubeconfig_secret_found | default(false) else 'MISSING' }}{% if bootstrap_secret_age.stdout is defined %} (created: {{ bootstrap_secret_age.stdout }}){% endif %}
          
          CAPA CONTROLLER LOG ANALYSIS:
          {% if capa_logs_result.stdout_lines | default([]) | length > 0 %}
          - Break-glass related log entries found: {{ capa_logs_result.stdout_lines | length }}
          {% for line in capa_logs_result.stdout_lines[:5] %}
          {{ line }}
          {% endfor %}
          {% if capa_logs_result.stdout_lines | length > 5 %}
          ... ({{ capa_logs_result.stdout_lines | length - 5 }} more lines)
          {% endif %}
          {% else %}
          - No break-glass related errors found in recent CAPA controller logs
          {% endif %}
          
          OCM ROLE CHECK:
          {% if ocm_role_check_failed | default(false) %}
          - Role check: COULD NOT DETERMINE (API call failed)
          {% else %}
          - Has cluster_owner role: {{ 'YES' if ocm_has_cluster_owner | default(false) else 'NO' }}
          - Has cluster_service_developer role: {{ 'YES' if ocm_has_cluster_service_developer | default(false) else 'NO' }}
          - Has break-glass permission: {{ 'YES' if ocm_has_break_glass_permission | default(false) else 'NO' }}
          {% endif %}
          - 403 is AMS access_review denial: {{ 'YES' if break_glass_403_is_ams_denial | default(false) | bool else 'NO' }}
          
          ROOT CAUSE ASSESSMENT:
          {% if (break_glass_403_is_ams_denial | default(false) | bool) or (not ocm_role_check_failed | default(false) and not ocm_has_break_glass_permission | default(false)) %}
          - Confidence: High
          - Primary Issue: OCM credential lacks ClusterBreakGlassCredential permission
          - Root Cause: AMS access_review denied the request — OCM credential does not have cluster_owner or cluster_service_developer role
          - Impact: CAPA controller cannot create/list break-glass credentials; reconcile external auth fails with 403
          - Note: SRE tokens (sre_agent, uhc_support) are explicitly excluded from this permission
          {% elif not (kubeconfig_secret_found | default(false)) or not (bootstrap_kubeconfig_secret_found | default(false)) %}
          - Confidence: High
          - Primary Issue: Missing provisioner kubeconfig secrets
          - Root Cause: Kubeconfig secrets deleted or missing on provisioner (common during ArgoCD adoption)
          - Impact: OCM API returns 403 — authentication context for hosted cluster is missing
          {% elif not (cluster_external_auth_status | default(false) | bool) %}
          - Confidence: High
          - Primary Issue: External authentication not enabled
          - Root Cause: Break-glass requires external auth to be enabled on the cluster
          {% elif ocm_whoami_result.rc != 0 %}
          - Confidence: High
          - Primary Issue: Invalid OCM token
          - Root Cause: OCM CLI authentication is invalid or expired
          {% else %}
          - Confidence: Low
          - Primary Issue: Unknown — all common causes checked
          - Root Cause: 403 may be due to RBAC, subscription, or service-side restrictions
          {% endif %}
          
          REMEDIATION STEPS:
          1. Verify cluster is healthy and MC (Management Cluster) is operational
          2. Recreate missing kubeconfig secrets on the provisioner:
             - {{ cluster_name }}-kubeconfig in namespace {{ capi_namespace }}
             - {{ cluster_name }}-bootstrap-kubeconfig in namespace {{ capi_namespace }}
          3. Ensure secrets contain valid cluster authentication data
          4. Restart CAPA controller if necessary: oc rollout restart deploy/capa-controller-manager -n {{ capa_system_namespace }}
          5. Retry break-glass credential operations after secret restoration
          
          ERROR CONTEXT:
          {{ break_glass_error_detail | default('No specific error detail captured') }}
          
          ========================================

    - name: Set root cause and remediation facts
      set_fact:
        break_glass_root_cause: >-
          {% if (break_glass_403_is_ams_denial | default(false) | bool) or (not ocm_role_check_failed | default(false) and not ocm_has_break_glass_permission | default(false)) %}
          [High confidence] AMS access_review denied ClusterBreakGlassCredential. The OCM credential used by CAPA lacks cluster_owner or cluster_service_developer role.
          Only cluster_owner and cluster_service_developer roles have break-glass permission; sre_agent and uhc_support are explicitly excluded.
          {% elif not (kubeconfig_secret_found | default(false)) or not (bootstrap_kubeconfig_secret_found | default(false)) %}
          [High confidence] Provisioner kubeconfig secrets missing. OCM API returns 403 because the authentication context for the hosted cluster is absent.
          {% elif not (cluster_external_auth_status | default(false) | bool) %}
          [High confidence] External authentication not enabled on cluster. Break-glass requires external auth.
          {% elif ocm_whoami_result.rc != 0 %}
          [High confidence] OCM CLI token is invalid or expired.
          {% else %}
          [Low confidence] All common causes checked — 403 may be due to RBAC, subscription, or service-side restrictions.
          {% endif %}
        break_glass_remediation_steps: >-
          {% if (break_glass_403_is_ams_denial | default(false) | bool) or (not ocm_role_check_failed | default(false) and not ocm_has_break_glass_permission | default(false)) %}
          {{ [
            'Verify the OCM token/credential used by CAPA on the provisioner has cluster_owner or cluster_service_developer role',
            'Update the CAPA OCM secret on the provisioner with a credential that has the correct role',
            'Note: SRE tokens cannot be used for break-glass operations (AMS excludes sre_agent and uhc_support from ClusterBreakGlassCredential)',
            'Restart CAPA controller after updating the secret: oc rollout restart deploy/capa-controller-manager -n ' + capa_system_namespace,
            'Retry break-glass credential operations'
          ] }}
          {% elif not (kubeconfig_secret_found | default(false)) or not (bootstrap_kubeconfig_secret_found | default(false)) %}
          {{ [
            'Verify cluster is healthy and MC is operational',
            'Recreate missing kubeconfig secrets on the provisioner (' + cluster_name + '-kubeconfig and ' + cluster_name + '-bootstrap-kubeconfig in ' + capi_namespace + ')',
            'Ensure secrets contain valid cluster authentication data from the MC',
            'Restart CAPA controller: oc rollout restart deploy/capa-controller-manager -n ' + capa_system_namespace,
            'Retry break-glass credential operations after secret restoration'
          ] }}
          {% elif not (cluster_external_auth_status | default(false) | bool) %}
          {{ [
            'Enable external authentication on the cluster via OCM or ROSA CLI',
            'Retry break-glass credential operations'
          ] }}
          {% elif ocm_whoami_result.rc != 0 %}
          {{ [
            'Re-authenticate OCM CLI: ocm login --token=<token>',
            'Retry break-glass credential operations'
          ] }}
          {% else %}
          {{ [
            'Check OCM subscription and RBAC permissions',
            'Contact Red Hat support if issue persists'
          ] }}
          {% endif %}

  when: break_glass_403_detected | default(false) | bool