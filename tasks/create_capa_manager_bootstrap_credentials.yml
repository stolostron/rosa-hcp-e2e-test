- name: Create capa-manager-bootstrap-credential variables
  no_log: true
  set_fact:
    aws_access_key_id: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') | default(AWS_ACCESS_KEY_ID, true) }}"
    aws_secret_access_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') | default(AWS_SECRET_ACCESS_KEY, true) }}"
    region: "us-east-1"

- name: Get AWS Credentials for capa-manager-bootstrap-credentials secret
  no_log: true
  shell: |
    echo '[default]
    aws_access_key_id = "{{ lookup('env', 'AWS_ACCESS_KEY_ID') | default(AWS_ACCESS_KEY_ID, true) }}"
    aws_secret_access_key = "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') | default(AWS_SECRET_ACCESS_KEY, true) }}"
    region = "{{ region }}"
    ' | base64 -w 0
  register: aws_credentials

- name: Create capa-manager-bootstrap-credentials.yaml from template
  no_log: true
  vars:
    aws_credentials: "{{ aws_credentials.stdout }}"
  template:
    src: "{{ automation_path }}/templates/capa-manager-bootstrap-credentials.yaml.j2"
    dest: "{{ output_dir }}/capa-manager-bootstrap-credentials.yaml"
    mode: '0600'

- name: Apply capa-manager-bootstrap-credentials changes
  shell: |
    oc apply -f {{ output_dir }}/capa-manager-bootstrap-credentials.yaml

- name: Remove credentials file from disk
  file:
    path: "{{ output_dir }}/capa-manager-bootstrap-credentials.yaml"
    state: absent
