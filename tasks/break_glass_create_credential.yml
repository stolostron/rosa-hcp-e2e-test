---
- name: Validate required variable cluster_id
  fail:
    msg: "Required variable cluster_id is not defined or empty"
  when: cluster_id is not defined or cluster_id == ""

- name: Initialize break-glass operation variables
  set_fact:
    break_glass_403_detected: false
    break_glass_403_is_ams_denial: false
    break_glass_credential_id: ""
    break_glass_create_result: "unknown"
    break_glass_error_detail: ""

- name: List existing break-glass credentials
  shell: |
    ocm get /api/clusters_mgmt/v1/clusters/"{{ cluster_id }}"/break_glass_credentials
  register: list_credentials_result
  failed_when: false
  changed_when: false

- name: Check for 403 on list operation
  set_fact:
    break_glass_403_detected: true
    break_glass_error_detail: "403 Forbidden on list operation: {{ list_credentials_result.stderr | default(list_credentials_result.stdout) }}"
    break_glass_403_is_ams_denial: "{{ 'Forbidden access' in (list_credentials_result.stderr | default('') + list_credentials_result.stdout | default('')) }}"
  when:
    - list_credentials_result.rc != 0
    - "'403' in (list_credentials_result.stderr | default('')) or '403' in (list_credentials_result.stdout | default(''))"

- name: Display existing credentials count if list succeeded
  debug:
    msg: |
      Existing break-glass credentials found: {{ (list_credentials_result.stdout | from_json).items | default([]) | length }}
  when: list_credentials_result.rc == 0

- name: Attempt to create break-glass credential
  shell: |
    ocm post /api/clusters_mgmt/v1/clusters/"{{ cluster_id }}"/break_glass_credentials --body '{}'
  register: create_credential_result
  failed_when: false
  changed_when: false
  when: not break_glass_403_detected

- name: Check for 403 on create operation
  set_fact:
    break_glass_403_detected: true
    break_glass_error_detail: "403 Forbidden on create operation: {{ create_credential_result.stderr | default(create_credential_result.stdout) }}"
    break_glass_403_is_ams_denial: "{{ 'Forbidden access' in (create_credential_result.stderr | default('') + create_credential_result.stdout | default('')) }}"
  when:
    - not break_glass_403_detected
    - create_credential_result is defined
    - create_credential_result.rc != 0
    - "'403' in (create_credential_result.stderr | default('')) or '403' in (create_credential_result.stdout | default(''))"

- name: Parse credential ID from create response
  set_fact:
    break_glass_credential_id: "{{ (create_credential_result.stdout | from_json).id }}"
    break_glass_create_result: "pending_issuance"
  when:
    - not break_glass_403_detected
    - create_credential_result is defined
    - create_credential_result.rc == 0

- name: Set create result as failed if not 403 but failed
  set_fact:
    break_glass_create_result: "failed"
    break_glass_error_detail: "Create failed: {{ create_credential_result.stderr | default(create_credential_result.stdout) }}"
  when:
    - not break_glass_403_detected
    - create_credential_result is defined
    - create_credential_result.rc != 0
    - "'403' not in (create_credential_result.stderr | default('')) and '403' not in (create_credential_result.stdout | default(''))"

- name: Set create result as forbidden if 403 detected
  set_fact:
    break_glass_create_result: "forbidden"
  when: break_glass_403_detected

- name: Poll for credential to become issued
  shell: |
    ocm get /api/clusters_mgmt/v1/clusters/"{{ cluster_id }}"/break_glass_credentials/"{{ break_glass_credential_id }}"
  register: credential_status_result
  retries: 20
  delay: 30
  until: 
    - credential_status_result.rc == 0
    - (credential_status_result.stdout | from_json).status == "issued"
  failed_when: false
  changed_when: false
  when: 
    - break_glass_create_result == "pending_issuance"
    - break_glass_credential_id != ""

- name: Set success after issuance confirmed
  set_fact:
    break_glass_create_result: "success"
  when:
    - break_glass_create_result == "pending_issuance"
    - credential_status_result is defined
    - credential_status_result.rc == 0
    - (credential_status_result.stdout | from_json).status | default('') == "issued"

- name: Set failed if issuance timed out
  set_fact:
    break_glass_create_result: "failed"
    break_glass_error_detail: "Credential created but never reached 'issued' status after polling"
  when:
    - break_glass_create_result == "pending_issuance"

- name: Retrieve kubeconfig for issued credential
  shell: |
    ocm get /api/clusters_mgmt/v1/clusters/{{ cluster_id }}/break_glass_credentials/{{ break_glass_credential_id }}/kubeconfig
  register: kubeconfig_result
  no_log: true
  failed_when: false
  changed_when: false
  when:
    - break_glass_create_result == "success"
    - credential_status_result is defined
    - credential_status_result.rc == 0
    - (credential_status_result.stdout | from_json).status | default('') == "issued"

- name: Validate kubeconfig content
  set_fact:
    kubeconfig_valid: "{{ kubeconfig_result.stdout | length > 100 }}"
  when: 
    - kubeconfig_result is defined
    - kubeconfig_result.rc == 0

- name: Display break-glass credential operation summary
  debug:
    msg: |
      Break-Glass Credential Operation Summary:
      ========================================
      Result: {{ break_glass_create_result }}
      Cluster ID: {{ cluster_id }}
      {% if break_glass_credential_id != "" %}
      Credential ID: {{ break_glass_credential_id }}
      {% endif %}
      {% if break_glass_403_detected %}
      403 Error Detected: YES
      Error Detail: {{ break_glass_error_detail }}
      {% endif %}
      {% if credential_status_result is defined and credential_status_result.rc == 0 %}
      Credential Status: {{ (credential_status_result.stdout | from_json).status | default('unknown') }}
      {% endif %}
      {% if kubeconfig_result is defined and kubeconfig_result.rc == 0 %}
      Kubeconfig Retrieved: YES ({{ kubeconfig_result.stdout | length }} characters)
      Kubeconfig Valid: {{ kubeconfig_valid | default(false) }}
      {% endif %}