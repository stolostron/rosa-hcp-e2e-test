apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-v2
  namespace: rosa-hcp-agent
  labels:
    app: agent-v2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-v2
  labels:
    app: agent-v2
rules:
  # Read pod logs (KubernetesLogStream)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Read namespaces and events for diagnostics
  - apiGroups: [""]
    resources: ["namespaces", "events"]
    verbs: ["get", "list", "watch"]
  # Read and patch ROSA HCP custom resources for diagnostics
  - apiGroups: ["controlplane.cluster.x-k8s.io"]
    resources: ["rosacontrolplanes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["infrastructure.cluster.x-k8s.io"]
    resources: ["rosanetworks", "rosaroleconfigs"]
    verbs: ["get", "list", "watch"]
  # Read deployments to verify CAPI/CAPA installation
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-v2
  labels:
    app: agent-v2
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-v2
subjects:
  - kind: ServiceAccount
    name: agent-v2
    namespace: rosa-hcp-agent
