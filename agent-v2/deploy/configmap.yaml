apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-v2-remediation-outcomes-1
  namespace: rosa-hcp-agent
  labels:
    app: agent-v2
    knowledge-base: remediation-outcomes
data:
  data.json: "[]"

---
# ---------------------------------------------------------------------------
# Init container merge script
# Merges numbered ConfigMap chunks into single files in an emptyDir.
# Extend by adding more ConfigMaps + volume mounts — no code changes needed.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-v2-init-script
  namespace: rosa-hcp-agent
  labels:
    app: agent-v2
data:
  merge_kb.py: |
    """
    Merge numbered knowledge-base ConfigMap chunks into single JSON files.

    Mount layout (set by the Deployment):
      /cms/known-issues/<N>/data.json     -> known_issues.json  (merge "patterns" arrays)
      /cms/fix-strategies/<N>/data.json   -> fix_strategies.json (merge "fix_strategies" dicts)
      /cms/remediation-outcomes/<N>/data.json -> remediation_outcomes.json (concatenate arrays)

    Output: /kb/{known_issues,fix_strategies,remediation_outcomes}.json

    To add a new chunk: create a ConfigMap, add a volume + volumeMount at the next
    numbered path, and re-apply the Deployment — no changes to this script.
    """
    import json
    import glob
    import os
    import sys

    KB = "/kb"
    CMS = "/cms"
    os.makedirs(KB, exist_ok=True)


    def load_chunks(pattern):
        paths = sorted(glob.glob(pattern))
        if not paths:
            print(f"  [warn] no files matched {pattern}", flush=True)
        chunks = []
        for p in paths:
            with open(p) as fh:
                chunks.append((p, json.load(fh)))
        return chunks


    def write(path, obj):
        with open(path, "w") as fh:
            json.dump(obj, fh, indent=2)
        size = os.path.getsize(path)
        print(f"  wrote {path} ({size} bytes)", flush=True)


    # ------------------------------------------------------------------
    # known_issues.json — merge "patterns" arrays across chunks
    # ------------------------------------------------------------------
    print("Merging known_issues.json ...", flush=True)
    chunks = load_chunks(f"{CMS}/known-issues/*/data.json")
    merged: dict = {}
    for path, chunk in chunks:
        for key, val in chunk.items():
            if key == "patterns":
                merged.setdefault("patterns", []).extend(val)
            else:
                merged[key] = val
        print(f"  + {path}: {len(chunk.get('patterns', []))} pattern(s)", flush=True)
    write(f"{KB}/known_issues.json", merged)
    print(f"  total patterns: {len(merged.get('patterns', []))}", flush=True)

    # ------------------------------------------------------------------
    # fix_strategies.json — merge "fix_strategies" dicts across chunks
    # ------------------------------------------------------------------
    print("Merging fix_strategies.json ...", flush=True)
    chunks = load_chunks(f"{CMS}/fix-strategies/*/data.json")
    merged = {}
    for path, chunk in chunks:
        for key, val in chunk.items():
            if key == "fix_strategies":
                merged.setdefault("fix_strategies", {}).update(val)
            else:
                merged[key] = val
        print(f"  + {path}: {len(chunk.get('fix_strategies', {}))} strategy/strategies", flush=True)
    write(f"{KB}/fix_strategies.json", merged)
    print(f"  total strategies: {len(merged.get('fix_strategies', {}))}", flush=True)

    # ------------------------------------------------------------------
    # remediation_outcomes.json — concatenate arrays across chunks
    # ------------------------------------------------------------------
    print("Merging remediation_outcomes.json ...", flush=True)
    chunks = load_chunks(f"{CMS}/remediation-outcomes/*/data.json")
    merged_list: list = []
    for path, chunk in chunks:
        if isinstance(chunk, list):
            merged_list.extend(chunk)
            print(f"  + {path}: {len(chunk)} entry/entries", flush=True)
        else:
            print(f"  [warn] {path} is not a JSON array, skipping", flush=True)
    write(f"{KB}/remediation_outcomes.json", merged_list)
    print(f"  total outcomes: {len(merged_list)}", flush=True)

    print("Knowledge base merge complete.", flush=True)
