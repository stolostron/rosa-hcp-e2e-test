# ---------------------------------------------------------------------------
# fix_strategies.json — chunk 1 of 1
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-v2-fix-strategies-1
  namespace: rosa-hcp-agent
  labels:
    app: agent-v2
    knowledge-base: fix-strategies
data:
  data.json: |
    {
      "version": "2.1.0",
      "description": "Machine-executable fix strategies — chunk 1 of 1",
      "fix_strategies": {
        "backoff_and_retry": {
          "action_type": "advisory",
          "parameters": ["backoff_seconds", "max_retries"],
          "action": {
            "message": "Rate limit detected: wait {backoff_seconds}s before retrying (max {max_retries} retries)",
            "success": true
          }
        },
        "refresh_ocm_token": {
          "action_type": "advisory",
          "parameters": [],
          "action": {
            "message": "OCM token refresh requires manual intervention — update credentials and retry",
            "success": false
          }
        },
        "log_and_continue": {
          "action_type": "advisory",
          "parameters": [],
          "action": {
            "message": "Issue logged for review — test execution continues",
            "success": true
          }
        },
        "manual_cloudformation_cleanup": {
          "action_type": "advisory",
          "parameters": ["message"],
          "action": {
            "message": "MANUAL INTERVENTION REQUIRED: {message}",
            "success": true
          }
        },
        "increase_timeout_and_monitor": {
          "action_type": "advisory",
          "parameters": ["suggested_timeout_increase"],
          "action": {
            "message": "Recommend increasing timeout by {suggested_timeout_increase} for this operation",
            "success": true
          }
        },
        "install_capi_capa": {
          "action_type": "cli_sequence",
          "parameters": [],
          "action": {
            "steps": [
              {
                "name": "check_capi",
                "type": "command",
                "command": ["oc", "get", "deployment", "capi-controller-manager", "-n", "capi-system"],
                "timeout": 10,
                "optional": true
              },
              {
                "name": "check_capa",
                "type": "command",
                "command": ["oc", "get", "deployment", "capa-controller-manager", "-n", "capa-system"],
                "timeout": 10,
                "optional": true
              }
            ],
            "success_message": "CAPI/CAPA controllers verified — both namespaces reachable",
            "failure_message": "CAPI/CAPA not installed — run suite 10-configure-mce-environment"
          }
        },
        "retry_cloudformation_delete": {
          "action_type": "cli_sequence",
          "parameters": ["stack_name", "region"],
          "action": {
            "steps": [
              {
                "name": "verify_stack_state",
                "type": "shell",
                "shell": [
                  "STATUS=$(aws cloudformation describe-stacks --stack-name {stack_name} --region {region} --query 'Stacks[0].StackStatus' --output text 2>&1)",
                  "RC=$?",
                  "if [ $RC -ne 0 ]; then",
                  "  echo \"$STATUS\" | grep -qi 'does not exist' && echo 'Stack already deleted' && exit 0",
                  "  echo \"Error: $STATUS\" && exit 1",
                  "fi",
                  "case \"$STATUS\" in",
                  "  DELETE_FAILED|DELETE_IN_PROGRESS) echo \"Stack status: $STATUS, proceeding\" ;;",
                  "  *) echo \"Unexpected state: $STATUS\" && exit 1 ;;",
                  "esac"
                ],
                "timeout": 15,
                "optional": false
              },
              {
                "name": "delete_vpc_endpoints",
                "type": "shell",
                "shell": [
                  "VPC_ID=$(aws cloudformation list-stack-resources --stack-name {stack_name} --region {region} --query 'StackResourceSummaries[?ResourceType==`AWS::EC2::VPC`].PhysicalResourceId' --output text 2>/dev/null)",
                  "[ -z \"$VPC_ID\" ] && echo 'No VPC in stack' && exit 0",
                  "VPCE=$(aws ec2 describe-vpc-endpoints --region {region} --filters 'Name=vpc-id,Values='\"$VPC_ID\" --query 'VpcEndpoints[*].VpcEndpointId' --output text 2>/dev/null)",
                  "[ -n \"$VPCE\" ] && aws ec2 delete-vpc-endpoints --region {region} --vpc-endpoint-ids $VPCE && sleep 20 || echo 'No endpoints'"
                ],
                "timeout": 90,
                "optional": true
              },
              {
                "name": "delete_enis",
                "type": "shell",
                "shell": [
                  "VPC_ID=$(aws cloudformation list-stack-resources --stack-name {stack_name} --region {region} --query 'StackResourceSummaries[?ResourceType==`AWS::EC2::VPC`].PhysicalResourceId' --output text 2>/dev/null)",
                  "[ -z \"$VPC_ID\" ] && exit 0",
                  "for ENI in $(aws ec2 describe-network-interfaces --region {region} --filters 'Name=vpc-id,Values='\"$VPC_ID\" --query 'NetworkInterfaces[*].NetworkInterfaceId' --output text 2>/dev/null); do",
                  "  AID=$(aws ec2 describe-network-interfaces --region {region} --network-interface-ids \"$ENI\" --query 'NetworkInterfaces[0].Attachment.AttachmentId' --output text 2>/dev/null)",
                  "  [ -n \"$AID\" ] && [ \"$AID\" != 'None' ] && aws ec2 detach-network-interface --region {region} --attachment-id \"$AID\" --force 2>/dev/null && sleep 2",
                  "  aws ec2 delete-network-interface --region {region} --network-interface-id \"$ENI\" && echo \"Deleted ENI $ENI\"",
                  "done"
                ],
                "timeout": 180,
                "optional": true
              },
              {
                "name": "delete_security_groups",
                "type": "shell",
                "shell": [
                  "VPC_ID=$(aws cloudformation list-stack-resources --stack-name {stack_name} --region {region} --query 'StackResourceSummaries[?ResourceType==`AWS::EC2::VPC`].PhysicalResourceId' --output text 2>/dev/null)",
                  "[ -z \"$VPC_ID\" ] && exit 0",
                  "for SG in $(aws ec2 describe-security-groups --region {region} --filters 'Name=vpc-id,Values='\"$VPC_ID\" --query 'SecurityGroups[?GroupName!=`default`].GroupId' --output text 2>/dev/null); do",
                  "  aws ec2 delete-security-group --region {region} --group-id \"$SG\" && echo \"Deleted SG $SG\"",
                  "done"
                ],
                "timeout": 60,
                "optional": true
              },
              {
                "name": "retry_stack_deletion",
                "type": "shell",
                "shell": [
                  "STATUS=$(aws cloudformation describe-stacks --stack-name {stack_name} --region {region} --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo 'GONE')",
                  "[ \"$STATUS\" = 'DELETE_FAILED' ] && aws cloudformation delete-stack --stack-name {stack_name} --region {region} && sleep 5",
                  "echo 'Retry complete, final status:' $(aws cloudformation describe-stacks --stack-name {stack_name} --region {region} --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo 'GONE')"
                ],
                "timeout": 30,
                "optional": false
              }
            ],
            "success_message": "CloudFormation stack {stack_name} cleanup and retry complete",
            "failure_message": "Failed to clean up or retry CloudFormation stack {stack_name}"
          }
        },
        "cleanup_vpc_dependencies": {
          "action_type": "cli_sequence",
          "parameters": ["vpc_id", "cluster_id", "region"],
          "action": {
            "steps": [
              {
                "name": "delete_tagged_enis",
                "type": "shell",
                "shell": [
                  "for ENI in $(aws ec2 describe-network-interfaces --region {region} --filters 'Name=vpc-id,Values={vpc_id}' 'Name=tag:cluster.x-k8s.io/cluster-name,Values={cluster_id}' --query 'NetworkInterfaces[*].NetworkInterfaceId' --output text 2>/dev/null); do",
                  "  AID=$(aws ec2 describe-network-interfaces --region {region} --network-interface-ids \"$ENI\" --query 'NetworkInterfaces[0].Attachment.AttachmentId' --output text 2>/dev/null)",
                  "  [ -n \"$AID\" ] && [ \"$AID\" != 'None' ] && aws ec2 detach-network-interface --region {region} --attachment-id \"$AID\" --force 2>/dev/null && sleep 2",
                  "  aws ec2 delete-network-interface --region {region} --network-interface-id \"$ENI\" && echo \"Deleted ENI $ENI\"",
                  "done"
                ],
                "timeout": 120,
                "optional": false
              },
              {
                "name": "delete_tagged_security_groups",
                "type": "shell",
                "shell": [
                  "for SG in $(aws ec2 describe-security-groups --region {region} --filters 'Name=vpc-id,Values={vpc_id}' 'Name=tag:red-hat-clustertype,Values={cluster_id}' --query 'SecurityGroups[?GroupName!=`default`].GroupId' --output text 2>/dev/null); do",
                  "  aws ec2 delete-security-group --region {region} --group-id \"$SG\" && echo \"Deleted SG $SG\"",
                  "done"
                ],
                "timeout": 60,
                "optional": true
              }
            ],
            "success_message": "VPC {vpc_id} dependency cleanup complete",
            "failure_message": "Failed to clean up VPC {vpc_id} dependencies"
          }
        }
      }
    }

