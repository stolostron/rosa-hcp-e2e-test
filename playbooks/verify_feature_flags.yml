    # --- disk_size ---
    - name: "CHECK: Disk Volume Size (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
        expected_volume_size: "{{ root_volume_size | default(300) | int }}"
      block:
        - name: Get root device name and block device mappings
          shell: >
            aws ec2 describe-instances
            --filters "Name=tag:kubernetes.io/cluster/{{ cluster_name }},Values=owned"
            "Name=instance-state-name,Values=running"
            --region {{ verify_region }}
            --query 'Reservations[0].Instances[0].{Root:RootDeviceName,BDM:BlockDeviceMappings}'
            --output json
          register: aws_instance_raw
          changed_when: false
          failed_when: false

        - name: Assert worker instance was found
          assert:
            that:
              - aws_instance_raw.rc == 0
              - aws_instance_raw.stdout | trim != 'null'
              - aws_instance_raw.stdout | trim | length > 0
            fail_msg: "FAIL: No running worker instances found for cluster"
            success_msg: "PASS: Worker instance found"

        - name: Parse instance response
          set_fact:
            aws_instance_info: "{{ aws_instance_raw.stdout | from_json }}"

        - name: Extract root volume ID
          set_fact:
            aws_volume_id: >-
              {{ aws_instance_info.BDM
                 | selectattr('DeviceName', 'equalto', aws_instance_info.Root)
                 | map(attribute='Ebs.VolumeId') | first }}

        - name: Query EBS volume size
          shell: >
            aws ec2 describe-volumes
            --volume-ids {{ aws_volume_id | trim }}
            --region {{ verify_region }}
            --query 'Volumes[0].Size'
            --output text
          register: aws_volume_size_raw
          changed_when: false

        - name: Assert root volume size matches expected
          assert:
            that:
              - aws_volume_size_raw.stdout | trim | int == expected_volume_size | int
            fail_msg: "FAIL: root volume size does not match expected"
            success_msg: "PASS: root volume size matches expected"

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: disk_size
            fail_detail: "no running worker instances found or root volume size does not match expected"

    # --- parallel_upgrade ---
    - name: "CHECK: Parallel Node Upgrade (via OCM API)"
      vars:
        expected_max_surge: "{{ max_surge | default(1) | int }}"
        expected_max_unavailable: "{{ max_unavailable | default(0) | int }}"
      block:
        - name: Query OCM node pools for upgrade config
          uri:
            url: "{{ ocm_api_url }}/api/clusters_mgmt/v1/clusters/{{ ocm_cluster.id }}/node_pools"
            method: GET
            headers:
              Authorization: "Bearer {{ ocm_token_result.json.access_token }}"
              Accept: application/json
            status_code: 200
            timeout: 15
          register: ocm_node_pools_result
          failed_when: false
          changed_when: false
          no_log: true
          when: ocm_available and ocm_cluster.id is defined

        - name: Assert node pool upgrade config via OCM
          assert:
            that:
              - ocm_node_pools_result.json.items | length > 0
              - ocm_node_pools_result.json.items[0].management_upgrade is defined
              - ocm_node_pools_result.json.items[0].management_upgrade.max_surge is defined
              - >-
                ocm_node_pools_result.json.items[0].management_upgrade.max_surge
                | string == expected_max_surge | string
              - >-
                ocm_node_pools_result.json.items[0].management_upgrade.max_unavailable
                | default(0) | string == expected_max_unavailable | string
            fail_msg: >-
              FAIL: OCM node pool upgrade config does not match expected
              maxSurge={{ expected_max_surge }}
              maxUnavailable={{ expected_max_unavailable }}
            success_msg: >-
              PASS: OCM node pool upgrade config matches expected
          when: ocm_available and ocm_node_pools_result is defined and ocm_node_pools_result.json is defined

        - name: Assert updateConfig via CRD (fallback)
          assert:
            that:
              - rmp.spec.updateConfig is defined
              - rmp.spec.updateConfig.rollingUpdate is defined
              - rmp.spec.updateConfig.rollingUpdate.maxSurge | int == expected_max_surge | int
              - rmp.spec.updateConfig.rollingUpdate.maxUnavailable | int == expected_max_unavailable | int
            fail_msg: "FAIL: rollingUpdate does not match expected"
            success_msg: "PASS: rollingUpdate matches expected (CRD fallback)"
          when: not ocm_available or ocm_node_pools_result is not defined or ocm_node_pools_result.json is not defined

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: parallel_upgrade
            fail_detail: "node pool upgrade config not set"

