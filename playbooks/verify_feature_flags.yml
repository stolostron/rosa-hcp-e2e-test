    # --- additional_tags ---
    - name: "CHECK: Additional Tags (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
      block:
        - name: Query AWS for resources tagged with cluster-specific tags
          shell: >
            aws resourcegroupstaggingapi get-resources
            --tag-filters
            Key=kubernetes.io/cluster/{{ cluster_name }},Values=owned
            Key=env,Values={{ environment_tag | default('test') }}
            Key=purpose,Values={{ purpose_tag | default('rosa-hcp-automation-testing') }}
            Key=automated,Values=true
            --region {{ verify_region }}
            --query 'ResourceTagMappingList[0].Tags'
            --output json
          register: aws_tags_raw
          changed_when: false

        - name: Parse AWS tags response
          set_fact:
            aws_tags_list: "{{ aws_tags_raw.stdout | from_json | default([], true) }}"

        - name: Assert tagged resources were found
          assert:
            that:
              - aws_tags_list is not none
              - aws_tags_list | length > 0
            fail_msg: "FAIL: No resources found with the expected cluster tags"
            success_msg: "PASS: Found tagged resources"

        - name: Reset AWS tags dict
          set_fact:
            aws_tags: {}

        - name: Convert AWS tags to dict
          set_fact:
            aws_tags: "{{ aws_tags | combine({item.Key: item.Value}) }}"
          loop: "{{ aws_tags_list }}"

        - name: Assert default tags present on AWS resources
          assert:
            that:
              - aws_tags_list | length > 0
              - "'env' in aws_tags"
              - "'purpose' in aws_tags"
              - "'automated' in aws_tags"
            fail_msg: "FAIL: Default tags (env, purpose, automated) not found on AWS resources"
            success_msg: "PASS: Default tags (env, purpose, automated) present on AWS resources"

        - name: Assert custom tags present on AWS resources
          assert:
            that:
              - item.key in aws_tags
              - aws_tags[item.key] | string == item.value | string
            fail_msg: "FAIL: Custom tag not found on AWS resources"
            success_msg: "PASS: Custom tag found on AWS resources"
          loop: "{{ additional_tags | default({}) | dict2items }}"
          when: additional_tags is defined and (additional_tags | length > 0)

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: additional_tags
            fail_detail: "default or custom tags not found on AWS resources"

