            --query 'AutoScalingGroups[].{Name:AutoScalingGroupName,Min:MinSize,Max:MaxSize,Desired:DesiredCapacity}'
            --output json
          register: aws_asg_raw
          changed_when: false

        - name: Parse ASG response
          set_fact:
            aws_asgs: "{{ aws_asg_raw.stdout | from_json }}"

        - name: Filter ASGs to default machine pool
          set_fact:
            aws_asgs_default_as: "{{ aws_asgs | selectattr('Name', 'search', 'default\\b|workers') | list | default(aws_asgs, true) }}"

        - name: Assert ASG min/max match expected autoscaling range
          assert:
            that:
              - aws_asgs_default_as | length > 0
              - aws_asgs_default_as[0].Min | int == expected_min | int
              - aws_asgs_default_as[0].Max | int == expected_max | int
              - aws_asgs_default_as[0].Max | int >= aws_asgs_default_as[0].Min | int
