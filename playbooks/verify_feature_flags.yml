    # --- availability_zones ---
    - name: "CHECK: Availability Zones (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
        stack_name: "{{ cluster_name }}-rosa-network-stack"
        expected_az_count: "{{ availability_zone_count | default(2) | int }}"
      block:
        - name: Query subnets created by CloudFormation stack
          shell: >
            aws ec2 describe-subnets
            --filters "Name=tag:aws:cloudformation:stack-name,Values={{ stack_name }}"
            --region {{ verify_region }}
            --query 'Subnets[].AvailabilityZone'
            --output json
          register: aws_subnet_azs_cfn
          changed_when: false
          failed_when: false

        - name: Query subnets from cluster-tagged instances (BYON fallback)
          shell: >
            aws ec2 describe-instances
            --filters "Name=tag:kubernetes.io/cluster/{{ cluster_name }},Values=owned"
            "Name=instance-state-name,Values=running"
            --region {{ verify_region }}
            --query 'Reservations[].Instances[].Placement.AvailabilityZone'
            --output json
          register: aws_subnet_azs_instance
          changed_when: false
          failed_when: false
          when: >-
            aws_subnet_azs_cfn.rc != 0 or
            ((aws_subnet_azs_cfn.stdout | default('[]', true) | from_json | default([])) | length == 0)

        - name: Set resolved subnet AZs
          set_fact:
            aws_subnet_azs: >-
              {{ ((aws_subnet_azs_cfn.stdout | default('[]', true) | from_json | default([]))
                  if aws_subnet_azs_cfn.rc == 0 and
                     ((aws_subnet_azs_cfn.stdout | default('[]', true) | from_json | default([])) | length > 0)
                  else (aws_subnet_azs_instance.stdout | default('[]') | from_json | default([])))
                 | unique | sort }}

        - name: Assert subnets span expected AZs
          assert:
            that:
              - aws_subnet_azs | length | int == expected_az_count | int
              - aws_subnet_azs | map('regex_search', '^' + verify_region) | select | list | length == aws_subnet_azs | length
            fail_msg: "FAIL: subnets do not span the expected number of AZs"
            success_msg: "PASS: subnets span the expected number of AZs"

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: availability_zones
            fail_detail: "subnets do not span expected number of AZs"

    # --- audit_logging ---
    - name: "CHECK: Log Forwarding (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
      block:
        - name: Assert at least one complete log destination is configured
          assert:
            that:
              - >-
                (log_forward_cloudwatch_role_arn is defined
                 and log_forward_cloudwatch_role_arn | length > 0
                 and log_forward_cloudwatch_log_group is defined
                 and log_forward_cloudwatch_log_group | length > 0) or
                (log_forward_s3_bucket is defined
                 and log_forward_s3_bucket | length > 0)
            fail_msg: >-
              FAIL: No complete log forwarding destination configured —
              provide both log_forward_cloudwatch_role_arn and
              log_forward_cloudwatch_log_group, or
              log_forward_s3_bucket
            success_msg: "PASS: Complete log destination configured"

        - name: Verify CloudWatch IAM role exists in AWS
          shell: >
            aws iam get-role
            --role-name {{ log_forward_cloudwatch_role_arn | regex_replace('^arn:aws:iam::[0-9]+:role/', '') }}
            --query 'Role.Arn'
            --output text
          register: aws_cw_role_check
          changed_when: false
          no_log: true
          when: log_forward_cloudwatch_role_arn is defined and (log_forward_cloudwatch_role_arn | length > 0)

        - name: Assert CloudWatch IAM role exists
          assert:
            that:
              - aws_cw_role_check.rc == 0
              - aws_cw_role_check.stdout | trim == log_forward_cloudwatch_role_arn
            fail_msg: "FAIL: CloudWatch IAM role not found in AWS"
            success_msg: "PASS: CloudWatch IAM role exists"
          when: log_forward_cloudwatch_role_arn is defined and (log_forward_cloudwatch_role_arn | length > 0)

        - name: Verify CloudWatch log group exists in AWS
          shell: >
            aws logs describe-log-groups
            --log-group-name-prefix {{ log_forward_cloudwatch_log_group }}
            --region {{ verify_region }}
            --query 'logGroups[?logGroupName==`{{ log_forward_cloudwatch_log_group }}`].logGroupName'
            --output text
          register: aws_cw_log_group_check
          changed_when: false
          when: log_forward_cloudwatch_log_group is defined and (log_forward_cloudwatch_log_group | length > 0)

        - name: Assert CloudWatch log group exists
          assert:
            that:
              - aws_cw_log_group_check.rc == 0
              - aws_cw_log_group_check.stdout | trim == log_forward_cloudwatch_log_group
            fail_msg: "FAIL: CloudWatch log group not found in the specified region"
            success_msg: "PASS: CloudWatch log group exists"
          when: log_forward_cloudwatch_log_group is defined and (log_forward_cloudwatch_log_group | length > 0)

        - name: Verify S3 bucket exists in AWS
          shell: >
            aws s3api head-bucket
            --bucket {{ log_forward_s3_bucket }}
          register: aws_s3_bucket_check
          changed_when: false
          failed_when: false
          when: log_forward_s3_bucket is defined and (log_forward_s3_bucket | length > 0)

        - name: Assert S3 bucket exists
          assert:
            that:
              - aws_s3_bucket_check.rc == 0
            fail_msg: "FAIL: S3 bucket not found in AWS"
            success_msg: "PASS: S3 bucket exists"
          when: log_forward_s3_bucket is defined and (log_forward_s3_bucket | length > 0)

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: audit_logging
            fail_detail: "log forwarding destinations not found in AWS"

    # --- proxy_enabled ---
    - name: "CHECK: Proxy Configuration (via OCM API)"
      block:
        - name: Assert proxy via OCM
          assert:
            that:
              - ocm_cluster.proxy is defined
              - >-
                (ocm_cluster.proxy.http_proxy is defined and ocm_cluster.proxy.http_proxy | length > 0) or
                (ocm_cluster.proxy.https_proxy is defined and ocm_cluster.proxy.https_proxy | length > 0)
            fail_msg: "FAIL: OCM proxy config missing or no http_proxy/https_proxy set"
            success_msg: "PASS: OCM confirms proxy is configured"
          when: ocm_available

        - name: Assert proxy via CRD (fallback)
          assert:
            that:
              - rcp.spec.proxy is defined
              - >-
                (rcp.spec.proxy.httpProxy is defined and rcp.spec.proxy.httpProxy | length > 0) or
                (rcp.spec.proxy.httpsProxy is defined and rcp.spec.proxy.httpsProxy | length > 0)
            fail_msg: "FAIL: proxy not set or missing httpProxy/httpsProxy"
            success_msg: "PASS: proxy configured with httpProxy and/or httpsProxy (CRD fallback)"
          when: not ocm_available

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: proxy_enabled
            fail_detail: "proxy is not configured"

    # ================================================================
    # SUMMARY
    # ================================================================
    - name: Build passed features list
      set_fact:
        results_passed: >-
          {{ requested_features_list
             | difference(results_warned | map('regex_replace', ':.*', '') | list)
             | difference(results_failed | map('regex_replace', ':.*', '') | list) }}

    - name: Feature verification summary
      debug:
        msg: |

          ═══════════════════════════════════════════════════════════════
          FEATURE FLAG VERIFICATION SUMMARY
          ═══════════════════════════════════════════════════════════════

          Cluster: {{ cluster_name | default('') | truncate(4, true, '****', 0) }}
          Namespace: {{ rosa_hcp_namespace | default('') | truncate(4, true, '****', 0) }}
          Cluster Version: {{ rcp.spec.version | default('unknown') }}
          OpenShift Version: {{ hub_ocp_version }}
          MCE Version: {{ mce_version }}
          CAPA Image: {{ capa_image }}
          Requested: {{ requested_features_list | join(', ') | default('none', true) }}

          ───────────────────────────────────────────────────────────────
          PASSED ({{ results_passed | length }}):
          {% for f in results_passed %}
            ✓ {{ f }}
          {% endfor %}
          {% if results_passed | length == 0 %}
            (none)
          {% endif %}

          {% if results_warned | length > 0 %}
          WARNED ({{ results_warned | length }}) — CRD does not support field:
          {% for w in results_warned %}
            ⚠ {{ w }}
          {% endfor %}

          {% endif %}
          {% if results_failed | length > 0 %}
          FAILED ({{ results_failed | length }}) — requested and CRD supports it, but missing:
          {% for f in results_failed %}
            ✗ {{ f }}
          {% endfor %}

          {% endif %}
          SKIPPED: {{ features_skipped }} (feature not requested — not an error)
          ═══════════════════════════════════════════════════════════════

    - name: Warn about CRD limitations
      debug:
        msg: "{{ results_warned | length }} feature(s) not supported by installed CRD version — platform limitation, not a test failure."
      when: results_warned | length > 0

    - name: Fail if any CRD-supported features are missing from spec
      fail:
        msg: >
          {{ results_failed | length }} requested feature(s) not found in cluster spec:
          {% for f in results_failed %}{{ f }}; {% endfor %}
      when: results_failed | length > 0
