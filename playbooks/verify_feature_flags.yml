---
- name: Verify feature flags on provisioned ROSA HCP cluster
  hosts: localhost
  gather_facts: false
  environment:
    AWS_ACCESS_KEY_ID: "{{ AWS_ACCESS_KEY_ID | default(lookup('env', 'AWS_ACCESS_KEY_ID'), true) }}"
    AWS_SECRET_ACCESS_KEY: "{{ AWS_SECRET_ACCESS_KEY | default(lookup('env', 'AWS_SECRET_ACCESS_KEY'), true) }}"
    AWS_SESSION_TOKEN: "{{ AWS_SESSION_TOKEN | default(lookup('env', 'AWS_SESSION_TOKEN'), true) }}"
    AWS_DEFAULT_REGION: "{{ aws_region | default(lookup('env', 'AWS_DEFAULT_REGION'), true) | default('us-west-2', true) }}"
  vars_files:
    - ../vars/vars.yml
  vars:
    rosa_hcp_namespace: "{{ rosa_hcp_namespace | default('ns-rosa-hcp') }}"
    features_passed: 0
    features_failed: 0
    features_skipped: 0
    features_warned: 0
    results_passed: []
    results_failed: []
    results_warned: []
    crd_field_map:
      no_cni: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "network.networkType"}
      private_network: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "endpointAccess"}
      external_oidc: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "enableExternalAuthProviders"}
      fips: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "fips"}
      etcd_kms: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "etcdEncryptionKMSARN"}
      user_agent: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "userAgent"}
      cluster_autoscaler_expander: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "autoscaler"}
      image_registry: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "clusterRegistryConfig"}
      disk_size: {crd: "rosamachinepools.infrastructure.cluster.x-k8s.io", field: "volumeSize"}
      parallel_upgrade: {crd: "rosamachinepools.infrastructure.cluster.x-k8s.io", field: "updateConfig"}
      security_groups: {crd: "rosamachinepools.infrastructure.cluster.x-k8s.io", field: "additionalSecurityGroups"}
      audit_logging: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "cloudWatchlogForwarder"}
      proxy_enabled: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "proxy"}
      default_autoscaling: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "defaultMachinePoolSpec"}
      domain_prefix: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "domainPrefix"}
      channel_group: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "channelGroup"}
      additional_tags: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "additionalTags"}
      availability_zones: {crd: "rosanetworks.infrastructure.cluster.x-k8s.io", field: "availabilityZones"}

  tasks:
    # ================================================================
    # SETUP: Login and get cluster resources
    # ================================================================
    - name: Set cluster credentials
      set_fact:
        ocp_user: "{{ OCP_HUB_CLUSTER_USER }}"
        ocp_password: "{{ OCP_HUB_CLUSTER_PASSWORD }}"
        api_url: "{{ OCP_HUB_API_URL }}"
      no_log: true

    - name: Login to OpenShift Hub Cluster
      include_tasks: "{{ playbook_dir }}/../tasks/login_ocp.yml"

    - name: Validate cluster_name is provided
      fail:
        msg: "cluster_name must be a non-empty DNS label (lowercase alphanumeric and hyphens only). Pass it with -e cluster_name=<name>"
      when: >-
        cluster_name is not defined or
        cluster_name == '' or
        cluster_name is not match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')

    - name: Parse requested features list
      set_fact:
        requested_features_list: "{{ (requested_features | default('') | string).split(',') | select | list }}"

    - name: Get ROSAControlPlane spec
      shell: >
        oc get rosacontrolplane "{{ cluster_name }}" -n "{{ rosa_hcp_namespace }}"
        -o json
      register: rcp_raw
      failed_when: false
      changed_when: false

    - name: Fail if ROSAControlPlane not found
      fail:
        msg: "ROSAControlPlane not found in the specified namespace. Verify cluster_name and rosa_hcp_namespace."
      when: rcp_raw.rc != 0

    - name: Parse ROSAControlPlane
      set_fact:
        rcp: "{{ rcp_raw.stdout | from_json }}"

    - name: Get ROSAMachinePool spec
      shell: >
        oc get rosamachinepool "{{ cluster_name }}" -n "{{ rosa_hcp_namespace }}"
        -o json
      register: rmp_raw
      failed_when: false
      changed_when: false

    - name: Fail if ROSAMachinePool not found
      fail:
        msg: "ROSAMachinePool not found in the specified namespace. Verify cluster_name and rosa_hcp_namespace."
      when: rmp_raw.rc != 0

    - name: Parse ROSAMachinePool
      set_fact:
        rmp: "{{ rmp_raw.stdout | from_json }}"

    - name: Get ROSANetwork spec
      shell: >
        oc get rosanetwork "{{ cluster_name }}-network" -n "{{ rosa_hcp_namespace }}"
        -o json
      register: rnet_raw
      ignore_errors: true
      changed_when: false

    - name: Parse ROSANetwork
      set_fact:
        rnet: "{{ rnet_raw.stdout | from_json }}"
      when: rnet_raw.rc == 0

    - name: Get MCE version
      shell: >
        set -o pipefail;
        oc get csv -n {{ mce_namespace }} -o json 2>/dev/null |
        jq -r '.items[] | select(.metadata.name | startswith("multicluster-engine")) | .spec.version' 2>/dev/null || echo "unknown"
      args:
        executable: /bin/bash
      register: mce_version_raw
      failed_when: false
      changed_when: false

    - name: Get CAPA controller image
      shell: >
        oc get deploy capa-controller-manager -n {{ capa_namespace }}
        -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "unknown"
      register: capa_image_raw
      failed_when: false
      changed_when: false

    - name: Get OCP version
      shell: >
        oc get clusterversion version
        -o jsonpath='{.status.desired.version}' 2>/dev/null || echo "unknown"
      register: ocp_version_raw
      failed_when: false
      changed_when: false

    - name: Set version facts
      set_fact:
        mce_version: "{{ mce_version_raw.stdout | default('unknown') }}"
        capa_image: "{{ capa_image_raw.stdout | default('unknown') }}"
        hub_ocp_version: "{{ ocp_version_raw.stdout | default('unknown') }}"

    - name: Display cluster info
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          Feature Flag Verification for: {{ cluster_name | default('') | truncate(4, true, '****', 0) }}
          Namespace: {{ rosa_hcp_namespace | default('') | truncate(4, true, '****', 0) }}
          OpenShift Version: {{ hub_ocp_version }}
          MCE Version: {{ mce_version }}
          CAPA Image: {{ capa_image }}
          Requested features: {{ requested_features_list | join(', ') | default('none (all checks will SKIP)', true) }}
          ═══════════════════════════════════════════════════════════════

    # ================================================================
    # SETUP: Query OCM API for cluster details
    # ================================================================
    - name: Get OCM credentials from rosa-creds-secret (mce namespace)
      shell: >
        oc get secret rosa-creds-secret -n "{{ mce_namespace }}"
        -o jsonpath='{.data.ocmClientID}|{.data.ocmClientSecret}|{.data.ocmApiUrl}'
      register: ocm_creds_mce
      failed_when: false
      changed_when: false
      no_log: true

    - name: Get OCM credentials from rosa-creds-secret (capi namespace fallback)
      shell: >
        oc get secret rosa-creds-secret -n "{{ capi_namespace }}"
        -o jsonpath='{.data.ocmClientID}|{.data.ocmClientSecret}|{.data.ocmApiUrl}'
      register: ocm_creds_capi
      failed_when: false
      changed_when: false
      no_log: true
      when: ocm_creds_mce.rc != 0 or ocm_creds_mce.stdout | length == 0

    - name: Select OCM credentials source
      set_fact:
        ocm_creds_raw: "{{ ocm_creds_mce if (ocm_creds_mce.rc == 0 and ocm_creds_mce.stdout | length > 0) else (ocm_creds_capi | default(ocm_creds_mce)) }}"
      no_log: true

    - name: Split raw OCM credentials
      set_fact:
        ocm_creds_parts: "{{ ocm_creds_raw.stdout.split('|') }}"
      when: ocm_creds_raw.rc == 0 and (ocm_creds_raw.stdout | length > 0)
      no_log: true

    - name: Decode OCM credentials
      set_fact:
        ocm_client_id: >-
          {{ (ocm_creds_parts[0] | b64decode)
             if ocm_creds_parts is defined and ocm_creds_parts | length > 0
             else '' }}
        ocm_client_secret: >-
          {{ (ocm_creds_parts[1] | b64decode)
             if ocm_creds_parts is defined and ocm_creds_parts | length > 1
             else '' }}
        ocm_api_url: >-
          {{ (ocm_creds_parts[2] | b64decode)
             if ocm_creds_parts is defined and ocm_creds_parts | length > 2
                and ocm_creds_parts[2] | length > 0
             else 'https://api.stage.openshift.com' }}
      no_log: true

    - name: Initialize OCM vars if credentials unavailable
      set_fact:
        ocm_client_id: ""
        ocm_client_secret: ""
        ocm_api_url: "https://api.stage.openshift.com"
      when: ocm_client_id is not defined or ocm_client_id | trim | length == 0

    - name: Reject non-HTTPS OCM API URL
      assert:
        that:
          - ocm_api_url is match('^https://')
        fail_msg: "FAIL: OCM API URL is not HTTPS — refusing to send bearer token"
      when: ocm_client_id | default('') | length > 0

    - name: Get OCM bearer token
      uri:
        url: "https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ ocm_client_id }}"
          client_secret: "{{ ocm_client_secret }}"
        status_code: 200
        timeout: 15
      register: ocm_token_result
      failed_when: false
      changed_when: false
      no_log: true
      when: ocm_client_id | default('') | length > 0

    - name: Query OCM for cluster details
      uri:
        url: "{{ ocm_api_url }}/api/clusters_mgmt/v1/clusters?search=name%3D'{{ cluster_name }}'"
        method: GET
        headers:
          Authorization: "Bearer {{ ocm_token_result.json.access_token }}"
          Accept: application/json
        status_code: 200
        timeout: 15
      register: ocm_cluster_result
      failed_when: false
      changed_when: false
      no_log: true
      when: ocm_token_result is defined and ocm_token_result.json is defined and ocm_token_result.json.access_token is defined

    - name: Set OCM cluster facts
      set_fact:
        ocm_cluster: "{{ ocm_cluster_result.json.items | selectattr('name', 'equalto', cluster_name) | first }}"
        ocm_available: true
      when:
        - ocm_cluster_result is defined
        - ocm_cluster_result.json is defined
        - ocm_cluster_result.json.items is defined
        - ocm_cluster_result.json.items | selectattr('name', 'equalto', cluster_name) | list | length > 0

    - name: Set OCM unavailable flag
      set_fact:
        ocm_available: false
        ocm_cluster: {}
      when: ocm_available is not defined

    - name: Display OCM status
      debug:
        msg: "{{ 'OCM API available — cluster found' if ocm_available else 'OCM API unavailable — falling back to CRD checks for applicable features' }}"

    # ================================================================
    # FEATURE CHECKS
    # ================================================================

    # --- no_cni ---
    - name: "CHECK: No CNI Plugin (via OCM API + cluster pod check)"
      block:
        - name: Assert networkType via OCM
          assert:
            that:
              - ocm_cluster.network.type is defined
              - ocm_cluster.network.type == 'Other'
            fail_msg: "FAIL: OCM network type is not 'Other'"
            success_msg: "PASS: OCM confirms networkType = Other"
          when: ocm_available
        - name: Assert networkType via CRD (fallback)
          assert:
            that:
              - rcp.spec.network.networkType is defined
              - rcp.spec.network.networkType == 'Other'
            fail_msg: "FAIL: networkType is not 'Other'"
            success_msg: "PASS: networkType = Other (CRD fallback)"
          when: not ocm_available

        - name: Get cluster kubeconfig secret
          shell: >
            oc get secret "{{ cluster_name }}-kubeconfig" -n "{{ rosa_hcp_namespace }}"
            -o jsonpath='{.data.kubeconfig}' 2>/dev/null | base64 -d
          register: cluster_kubeconfig_raw
          failed_when: false
          changed_when: false
          no_log: true

        - name: Check for OVN-Kubernetes pods on provisioned cluster
          shell: >
            oc --kubeconfig=/dev/stdin get pods -n openshift-ovn-kubernetes
            --no-headers 2>/dev/null <<< "{{ cluster_kubeconfig_raw.stdout }}" | wc -l
          register: ovn_pod_count
          failed_when: false
          changed_when: false
          no_log: true
          when: cluster_kubeconfig_raw.rc == 0 and cluster_kubeconfig_raw.stdout | length > 0

        - name: Assert OVN-Kubernetes is not running
          assert:
            that:
              - ovn_pod_count.stdout | default('0') | trim | int == 0
            fail_msg: "FAIL: OVN-Kubernetes pods found — default CNI is still running"
            success_msg: "PASS: No OVN-Kubernetes pods — default CNI is not installed"
          when: ovn_pod_count is defined and ovn_pod_count.rc is defined and ovn_pod_count.rc == 0

        - name: Validate cni_provider format
          assert:
            that:
              - cni_provider is match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
            fail_msg: "FAIL: cni_provider contains invalid characters"
          when: cni_provider is defined and cni_provider | length > 0

        - name: Write temporary kubeconfig for CNI check
          copy:
            content: "{{ cluster_kubeconfig_raw.stdout }}"
            dest: "/tmp/.cni-check-kubeconfig-{{ cluster_name }}"
            mode: "0600"
          no_log: true
          when:
            - cluster_kubeconfig_raw.rc == 0 and cluster_kubeconfig_raw.stdout | length > 0
            - cni_provider is defined and cni_provider | length > 0

        - name: Check for custom CNI pods (if cni_provider specified)
          command:
            argv:
              - oc
              - --kubeconfig=/tmp/.cni-check-kubeconfig-{{ cluster_name }}
              - get
              - pods
              - -n
              - "{{ cni_provider }}"
              - --no-headers
          register: custom_cni_pod_count_raw
          failed_when: false
          changed_when: false
          no_log: true
          when:
            - cluster_kubeconfig_raw.rc == 0 and cluster_kubeconfig_raw.stdout | length > 0
            - cni_provider is defined and cni_provider | length > 0

        - name: Count custom CNI pods
          set_fact:
            custom_cni_pod_count: "{{ custom_cni_pod_count_raw.stdout_lines | default([]) | length }}"
          when:
            - custom_cni_pod_count_raw is defined
            - cni_provider is defined and cni_provider | length > 0

        - name: Clean up temporary kubeconfig
          file:
            path: "/tmp/.cni-check-kubeconfig-{{ cluster_name }}"
            state: absent
          no_log: true
          when: cni_provider is defined and cni_provider | length > 0

        - name: Assert custom CNI pods are running
          assert:
            that:
              - custom_cni_pod_count | default(0) | int > 0
            fail_msg: "FAIL: No {{ cni_provider }} pods found — custom CNI not installed"
            success_msg: "PASS: {{ cni_provider }} pods running ({{ custom_cni_pod_count }} pods)"
          when:
            - custom_cni_pod_count is defined
            - cni_provider is defined and cni_provider | length > 0

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: no_cni
            fail_detail: "networkType is not 'Other' or default CNI is still running"

    # --- private_network ---
    - name: "CHECK: Private Cluster (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
        stack_name: "{{ cluster_name }}-rosa-network-stack"
      block:
        - name: Query VPC ID from CloudFormation stack subnets
          shell: >
            aws ec2 describe-subnets
            --filters "Name=tag:aws:cloudformation:stack-name,Values={{ stack_name }}"
            --region {{ verify_region }}
            --query 'Subnets[0].VpcId'
            --output text
          register: aws_vpc_id_cfn
          changed_when: false
          failed_when: false

        - name: Query VPC ID from cluster-tagged instances (BYON fallback)
          shell: >
            aws ec2 describe-instances
            --filters "Name=tag:kubernetes.io/cluster/{{ cluster_name }},Values=owned"
            "Name=instance-state-name,Values=running"
            --region {{ verify_region }}
            --query 'Reservations[0].Instances[0].VpcId'
            --output text
          register: aws_vpc_id_instance
          changed_when: false
          failed_when: false
          when: aws_vpc_id_cfn.stdout | default('') | trim is not match('^vpc-')

        - name: Set resolved VPC ID
          set_fact:
            aws_vpc_id: >-
              {{ (aws_vpc_id_cfn.stdout | trim)
                 if (aws_vpc_id_cfn.stdout | default('') | trim) is match('^vpc-')
                 else (aws_vpc_id_instance.stdout | default('') | trim) }}

        - name: Assert VPC ID was resolved
          assert:
            that:
              - aws_vpc_id is match('^vpc-')
            fail_msg: "FAIL: No VPC found via CloudFormation stack or cluster-tagged instances"
            success_msg: "PASS: VPC ID resolved"

        - name: Check for internet gateway attached to VPC
          shell: >
            aws ec2 describe-internet-gateways
            --filters "Name=attachment.vpc-id,Values={{ aws_vpc_id }}"
            --region {{ verify_region }}
            --query 'InternetGateways[].InternetGatewayId'
            --output json
          register: aws_igw_raw
          changed_when: false

        - name: Parse IGW response
          set_fact:
            aws_igws: "{{ aws_igw_raw.stdout | from_json }}"

        - name: Assert no internet gateway attached to VPC
          assert:
            that:
              - aws_igws | length == 0
            fail_msg: "FAIL: Internet gateway(s) attached to VPC — cluster is not private"
            success_msg: "PASS: No internet gateway attached to VPC"

        - name: Query load balancers in the VPC
          shell: >
            aws elbv2 describe-load-balancers
            --region {{ verify_region }}
            --query "LoadBalancers[?VpcId=='{{ aws_vpc_id }}'].{Name:LoadBalancerName,Scheme:Scheme}"
            --output json
          register: aws_nlb_raw
          changed_when: false

        - name: Parse NLB response
          set_fact:
            aws_nlbs: "{{ aws_nlb_raw.stdout | from_json }}"

        - name: Assert cluster is private (no internet-facing LBs)
          assert:
            that:
              - aws_nlbs | selectattr('Scheme', 'equalto', 'internet-facing') | list | length == 0
            fail_msg: "FAIL: Found internet-facing load balancer(s) in VPC — cluster is not private"
            success_msg: "PASS: All load balancers are internal — cluster is private"

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: private_network
            fail_detail: "cluster is not private or could not verify VPC/LB configuration"

    # --- external_oidc ---
    - name: "CHECK: External OIDC (via OCM API + issuer validation)"
      block:
        - name: Assert external auth via OCM
          assert:
            that:
              - ocm_cluster.external_auth_config is defined
              - ocm_cluster.external_auth_config.enabled | default(false) | bool
            fail_msg: "FAIL: OCM external_auth_config not enabled"
            success_msg: "PASS: OCM confirms external auth is enabled"
          when: ocm_available
        - name: Assert externalAuthProviders via CRD (fallback)
          assert:
            that:
              - rcp.spec.enableExternalAuthProviders is defined
              - rcp.spec.enableExternalAuthProviders | bool
              - rcp.spec.externalAuthProviders is defined
              - rcp.spec.externalAuthProviders | length > 0
            fail_msg: "FAIL: externalAuthProviders not configured"
            success_msg: "PASS: externalAuthProviders configured (CRD fallback)"
          when: not ocm_available
        - name: Assert externalAuthProviders array exists in CRD
          assert:
            that:
              - rcp.spec.externalAuthProviders is defined
              - rcp.spec.externalAuthProviders | length > 0
            fail_msg: "FAIL: externalAuthProviders array missing from CRD"
            success_msg: "PASS: externalAuthProviders present in CRD"

        - name: Extract OIDC issuer URL from CRD
          set_fact:
            oidc_issuer_url: "{{ (rcp.spec.externalAuthProviders[0].issuer | default({})).issuerURL | default('') }}"
        - name: Assert OIDC issuer URL is present
          assert:
            that:
              - oidc_issuer_url | length > 0
              - oidc_issuer_url is match('^https://')
            fail_msg: "FAIL: OIDC issuer URL is missing or not HTTPS in externalAuthProviders[0]"
            success_msg: "PASS: OIDC issuer URL is present and uses HTTPS"
        - name: Validate OIDC issuer URL is reachable
          uri:
            url: "{{ oidc_issuer_url }}/.well-known/openid-configuration"
            method: GET
            status_code: 200
            timeout: 10
            validate_certs: true
          register: oidc_discovery_result
          failed_when: false
          changed_when: false
          when: oidc_issuer_url is defined and oidc_issuer_url | length > 0
        - name: Assert OIDC discovery document is valid
          assert:
            that:
              - oidc_discovery_result.status | int == 200
              - oidc_discovery_result.json.issuer is defined
              - oidc_discovery_result.json.issuer == oidc_issuer_url
            fail_msg: "FAIL: OIDC issuer is not reachable or returned invalid discovery document"
            success_msg: "PASS: OIDC issuer validated — returns valid OpenID configuration"
          when:
            - oidc_issuer_url is defined and oidc_issuer_url | length > 0
            - oidc_discovery_result is defined
            - oidc_discovery_result.status is defined
        - name: Assert OIDC audiences configured
          assert:
            that:
              - rcp.spec.externalAuthProviders[0].issuer.audiences is defined
              - rcp.spec.externalAuthProviders[0].issuer.audiences | length > 0
            fail_msg: "FAIL: OIDC audiences not configured"
            success_msg: "PASS: OIDC audiences configured"
          when: rcp.spec.externalAuthProviders is defined and rcp.spec.externalAuthProviders | length > 0
        - name: Assert OIDC claim mappings configured
          assert:
            that:
              - rcp.spec.externalAuthProviders[0].claimMappings is defined
              - rcp.spec.externalAuthProviders[0].claimMappings.username is defined
              - rcp.spec.externalAuthProviders[0].claimMappings.username.claim is defined
            fail_msg: "FAIL: OIDC claim mappings not configured"
            success_msg: "PASS: OIDC claim mappings configured"
          when: rcp.spec.externalAuthProviders is defined and rcp.spec.externalAuthProviders | length > 0
        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: external_oidc
            fail_detail: "external OIDC auth not enabled or issuer validation failed"

    # --- fips ---
    - name: "CHECK: FIPS Mode (via OCM API + AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
      block:
        - name: Assert FIPS via OCM
          assert:
            that:
              - ocm_cluster.fips is defined
              - ocm_cluster.fips | bool
            fail_msg: "FAIL: OCM reports FIPS is not enabled"
            success_msg: "PASS: OCM confirms FIPS is enabled"
          when: ocm_available

        - name: Assert FIPS via CRD (fallback)
          assert:
            that:
              - rcp.spec.fips is defined
              - rcp.spec.fips == 'Enabled'
            fail_msg: "FAIL: CRD fips is not 'Enabled'"
            success_msg: "PASS: CRD confirms fips = Enabled (CRD fallback)"
          when: not ocm_available

        - name: Get AMI ID from cluster worker instance
          shell: >
            aws ec2 describe-instances
            --filters "Name=tag:kubernetes.io/cluster/{{ cluster_name }},Values=owned"
            "Name=instance-state-name,Values=running"
            --region {{ verify_region }}
            --query 'Reservations[].Instances[].ImageId'
            --output json
          register: aws_ami_ids_raw
          changed_when: false

        - name: Select first unique AMI ID from cluster instances
          set_fact:
            aws_ami_id: "{{ aws_ami_ids_raw.stdout | from_json | default([]) | unique | first | default('') }}"

        - name: Assert AMI ID was resolved
          assert:
            that:
              - aws_ami_id | trim | length > 0
              - aws_ami_id | trim != 'None'
            fail_msg: "FAIL: No running worker instances found for cluster"
            success_msg: "PASS: Worker AMI ID resolved"

        - name: Get AMI description
          shell: >
            aws ec2 describe-images
            --image-ids {{ aws_ami_id | trim }}
            --region {{ verify_region }}
            --query 'Images[0].{Name:Name,Description:Description}'
            --output json
          register: aws_ami_info_raw
          changed_when: false

        - name: Parse AMI info
          set_fact:
            aws_ami_info: "{{ aws_ami_info_raw.stdout | from_json }}"

        - name: Assert worker AMI is FIPS-enabled
          assert:
            that:
              - "(aws_ami_info.Name | default('') | lower) is search('\\bfips\\b') or (aws_ami_info.Description | default('') | lower) is search('\\bfips\\b')"
            fail_msg: "FAIL: Worker AMI does not appear to be FIPS-enabled"
            success_msg: "PASS: Worker AMI is FIPS-enabled"

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: fips
            fail_detail: "FIPS not enabled via OCM/CRD or worker AMI is not FIPS-enabled"

    # --- etcd_kms ---
    - name: "CHECK: ETCD KMS Encryption (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
        kms_arn: "{{ etcd_encryption_kms_arn | default(rcp.spec.etcdEncryptionKMSARN | default('')) }}"
      block:
        - name: Assert KMS ARN is provided
          assert:
            that:
              - kms_arn | length > 0
              - "kms_arn is match('^arn:aws:kms:')"
            fail_msg: "FAIL: etcdEncryptionKMSARN not set or not a valid KMS ARN"
            success_msg: "PASS: KMS ARN format valid"

        - name: Verify KMS key exists and is enabled in AWS
          shell: >
            aws kms describe-key
            --key-id {{ kms_arn }}
            --region {{ verify_region }}
            --query 'KeyMetadata.{Arn:Arn,Enabled:Enabled,State:KeyState}'
            --output json
          register: aws_kms_check
          changed_when: false

        - name: Parse KMS key response
          set_fact:
            aws_kms_key: "{{ aws_kms_check.stdout | from_json }}"

        - name: Assert KMS key is enabled and ARN matches
          assert:
            that:
              - aws_kms_key.Arn == kms_arn
              - aws_kms_key.Enabled | bool
              - aws_kms_key.State == 'Enabled'
            fail_msg: "FAIL: KMS key not found, disabled, or ARN mismatch"
            success_msg: "PASS: KMS key exists and is enabled"

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: etcd_kms
            fail_detail: "KMS key not found or not enabled in AWS"

