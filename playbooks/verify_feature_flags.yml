---
- name: Verify feature flags on provisioned ROSA HCP cluster
  hosts: localhost
  gather_facts: false
  environment:
    AWS_ACCESS_KEY_ID: "{{ AWS_ACCESS_KEY_ID | default(lookup('env', 'AWS_ACCESS_KEY_ID')) }}"
    AWS_SECRET_ACCESS_KEY: "{{ AWS_SECRET_ACCESS_KEY | default(lookup('env', 'AWS_SECRET_ACCESS_KEY')) }}"
    AWS_DEFAULT_REGION: "{{ aws_region | default('us-west-2') }}"
  vars_files:
    - ../vars/vars.yml
  vars:
    capi_namespace: "{{ capi_namespace | default('ns-rosa-hcp') }}"
    features_passed: 0
    features_failed: 0
    features_skipped: 0
    features_warned: 0
    results_passed: []
    results_failed: []
    results_warned: []
    crd_field_map:
      no_cni: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "network.networkType"}
      private_network: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "endpointAccess"}
      external_oidc: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "enableExternalAuthProviders"}
      fips: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "fips"}
      etcd_kms: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "etcdEncryptionKMSARN"}
      user_agent: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "userAgent"}
      cluster_autoscaler_expander: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "autoscaler"}
      image_registry: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "clusterRegistryConfig"}
      disk_size: {crd: "rosamachinepools.infrastructure.cluster.x-k8s.io", field: "volumeSize"}
      parallel_upgrade: {crd: "rosamachinepools.infrastructure.cluster.x-k8s.io", field: "updateConfig"}
      security_groups: {crd: "rosamachinepools.infrastructure.cluster.x-k8s.io", field: "additionalSecurityGroups"}
      audit_logging: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "cloudWatchlogForwarder"}
      proxy_enabled: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "proxy"}
      default_autoscaling: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "defaultMachinePoolSpec"}
      domain_prefix: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "domainPrefix"}
      channel_group: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "channelGroup"}
      additional_tags: {crd: "rosacontrolplanes.controlplane.cluster.x-k8s.io", field: "additionalTags"}
      availability_zones: {crd: "rosanetworks.infrastructure.cluster.x-k8s.io", field: "availabilityZones"}

  tasks:
    # ================================================================
    # SETUP: Login and get cluster resources
    # ================================================================
    - name: Set cluster credentials
      set_fact:
        ocp_user: "{{ OCP_HUB_CLUSTER_USER }}"
        ocp_password: "{{ OCP_HUB_CLUSTER_PASSWORD }}"
        api_url: "{{ OCP_HUB_API_URL }}"

    - name: Login to OpenShift Hub Cluster
      include_tasks: "{{ playbook_dir }}/../tasks/login_ocp.yml"

    - name: Validate cluster_name is provided
      fail:
        msg: "cluster_name is required. Pass it with -e cluster_name=<name>"
      when: cluster_name is not defined or cluster_name == ''

    - name: Parse requested features list
      set_fact:
        requested_features_list: "{{ (requested_features | default('') | string).split(',') | select | list }}"

    - name: Get ROSAControlPlane spec
      shell: >
        oc get rosacontrolplane {{ cluster_name }} -n {{ capi_namespace }}
        -o json
      register: rcp_raw
      failed_when: false
      changed_when: false

    - name: Fail if ROSAControlPlane not found
      fail:
        msg: "ROSAControlPlane '{{ cluster_name }}' not found in namespace '{{ capi_namespace }}'. Verify cluster_name and capi_namespace."
      when: rcp_raw.rc != 0

    - name: Parse ROSAControlPlane
      set_fact:
        rcp: "{{ rcp_raw.stdout | from_json }}"

    - name: Get ROSAMachinePool spec
      shell: >
        oc get rosamachinepool {{ cluster_name }} -n {{ capi_namespace }}
        -o json
      register: rmp_raw
      failed_when: false
      changed_when: false

    - name: Fail if ROSAMachinePool not found
      fail:
        msg: "ROSAMachinePool '{{ cluster_name }}' not found in namespace '{{ capi_namespace }}'. Verify cluster_name and capi_namespace."
      when: rmp_raw.rc != 0

    - name: Parse ROSAMachinePool
      set_fact:
        rmp: "{{ rmp_raw.stdout | from_json }}"

    - name: Get ROSANetwork spec
      shell: >
        oc get rosanetwork {{ cluster_name }}-network -n {{ capi_namespace }}
        -o json
      register: rnet_raw
      ignore_errors: true

    - name: Parse ROSANetwork
      set_fact:
        rnet: "{{ rnet_raw.stdout | from_json }}"
      when: rnet_raw.rc == 0

    - name: Get MCE version
      shell: >
        oc get csv -n multicluster-engine -o json 2>/dev/null |
        jq -r '.items[] | select(.metadata.name | startswith("multicluster-engine")) | .spec.version' 2>/dev/null || echo "unknown"
      register: mce_version_raw
      failed_when: false
      changed_when: false

    - name: Get CAPA controller image
      shell: >
        oc get deploy capa-controller-manager -n multicluster-engine
        -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "unknown"
      register: capa_image_raw
      failed_when: false
      changed_when: false

    - name: Get OCP version
      shell: >
        oc get clusterversion version
        -o jsonpath='{.status.desired.version}' 2>/dev/null || echo "unknown"
      register: ocp_version_raw
      failed_when: false
      changed_when: false

    - name: Set version facts
      set_fact:
        mce_version: "{{ mce_version_raw.stdout | default('unknown') }}"
        capa_image: "{{ capa_image_raw.stdout | default('unknown') }}"
        hub_ocp_version: "{{ ocp_version_raw.stdout | default('unknown') }}"

    - name: Display cluster info
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          Feature Flag Verification for: {{ cluster_name }}
          Namespace: {{ capi_namespace }}
          OpenShift Version: {{ hub_ocp_version }}
          MCE Version: {{ mce_version }}
          CAPA Image: {{ capa_image }}
          Requested features: {{ requested_features_list | join(', ') | default('none (all checks will SKIP)', true) }}
          ═══════════════════════════════════════════════════════════════

    # ================================================================
    # SETUP: Query OCM API for cluster details
    # ================================================================
    - name: Get OCM credentials from rosa-creds-secret (multicluster-engine)
      shell: >
        oc get secret rosa-creds-secret -n multicluster-engine
        -o jsonpath='{.data.ocmClientID}|{.data.ocmClientSecret}|{.data.ocmApiUrl}'
      register: ocm_creds_mce
      failed_when: false
      changed_when: false
      no_log: true

    - name: Get OCM credentials from rosa-creds-secret (capi namespace fallback)
      shell: >
        oc get secret rosa-creds-secret -n {{ capi_namespace }}
        -o jsonpath='{.data.ocmClientID}|{.data.ocmClientSecret}|{.data.ocmApiUrl}'
      register: ocm_creds_capi
      failed_when: false
      changed_when: false
      no_log: true
      when: ocm_creds_mce.rc != 0 or ocm_creds_mce.stdout | length == 0

    - name: Select OCM credentials source
      set_fact:
        ocm_creds_raw: "{{ ocm_creds_mce if (ocm_creds_mce.rc == 0 and ocm_creds_mce.stdout | length > 0) else (ocm_creds_capi | default(ocm_creds_mce)) }}"

    - name: Decode OCM credentials
      set_fact:
        ocm_client_id: "{{ (ocm_creds_raw.stdout.split('|')[0] | b64decode) if ocm_creds_raw.rc == 0 and ocm_creds_raw.stdout | length > 0 else '' }}"
        ocm_client_secret: "{{ (ocm_creds_raw.stdout.split('|')[1] | b64decode) if ocm_creds_raw.rc == 0 and ocm_creds_raw.stdout.split('|') | length > 1 else '' }}"
        ocm_api_url: "{{ (ocm_creds_raw.stdout.split('|')[2] | b64decode) if ocm_creds_raw.rc == 0 and ocm_creds_raw.stdout.split('|') | length > 2 and ocm_creds_raw.stdout.split('|')[2] | length > 0 else 'https://api.stage.openshift.com' }}"
      no_log: true

    - name: Initialize OCM vars if credentials unavailable
      set_fact:
        ocm_client_id: ""
        ocm_client_secret: ""
        ocm_api_url: "https://api.stage.openshift.com"
      when: ocm_client_id is not defined or ocm_client_id | length == 0

    - name: Get OCM bearer token
      uri:
        url: "https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ ocm_client_id }}"
          client_secret: "{{ ocm_client_secret }}"
        status_code: 200
        timeout: 15
      register: ocm_token_result
      failed_when: false
      changed_when: false
      no_log: true
      when: ocm_client_id | default('') | length > 0

    - name: Query OCM for cluster details
      uri:
        url: "{{ ocm_api_url }}/api/clusters_mgmt/v1/clusters?search=name%3D'{{ cluster_name }}'"
        method: GET
        headers:
          Authorization: "Bearer {{ ocm_token_result.json.access_token }}"
          Accept: application/json
        status_code: 200
        timeout: 15
      register: ocm_cluster_result
      failed_when: false
      changed_when: false
      when: ocm_token_result is defined and ocm_token_result.json is defined and ocm_token_result.json.access_token is defined

    - name: Set OCM cluster facts
      set_fact:
        ocm_cluster: "{{ ocm_cluster_result.json.items | selectattr('name', 'equalto', cluster_name) | first }}"
        ocm_available: true
      when:
        - ocm_cluster_result is defined
        - ocm_cluster_result.json is defined
        - ocm_cluster_result.json.items is defined
        - ocm_cluster_result.json.items | selectattr('name', 'equalto', cluster_name) | list | length > 0

    - name: Set OCM unavailable flag
      set_fact:
        ocm_available: false
        ocm_cluster: {}
      when: ocm_available is not defined

    - name: Display OCM status
      debug:
        msg: "{{ 'OCM API available — cluster found' if ocm_available else 'OCM API unavailable — falling back to CRD checks for applicable features' }}"

    # ================================================================
    # FEATURE CHECKS
    # ================================================================

    # --- no_cni ---
    - name: "CHECK: No CNI Plugin (via OCM API)"
      block:
        - name: Assert networkType via OCM
          assert:
            that:
              - ocm_cluster.network.type is defined
              - ocm_cluster.network.type == 'Other'
            fail_msg: "FAIL: OCM network type is not 'Other'"
            success_msg: "PASS: OCM confirms networkType = Other"
          when: ocm_available
        - name: Assert networkType via CRD (fallback)
          assert:
            that:
              - rcp.spec.network.networkType is defined
              - rcp.spec.network.networkType == 'Other'
            fail_msg: "FAIL: networkType is '{{ rcp.spec.network.networkType | default('not set') }}', expected 'Other'"
            success_msg: "PASS: networkType = Other (CRD fallback)"
          when: not ocm_available
        - name: Fail if neither check ran
          fail:
            msg: "BUG: neither OCM nor CRD check executed for no_cni"
          when: ocm_available is not defined
        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: no_cni
            fail_detail: "networkType is not 'Other'"

    # --- private_network ---
    - name: "CHECK: Private Cluster (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
        stack_name: "{{ cluster_name }}-rosa-network-stack"
      block:
        - name: Query VPC ID from CloudFormation stack subnets
          shell: >
            aws ec2 describe-subnets
            --filters "Name=tag:aws:cloudformation:stack-name,Values={{ stack_name }}"
            --region {{ verify_region }}
            --query 'Subnets[0].VpcId'
            --output text
          register: aws_vpc_id_raw
          changed_when: false

        - name: Check for internet gateway attached to VPC
          shell: >
            aws ec2 describe-internet-gateways
            --filters "Name=attachment.vpc-id,Values={{ aws_vpc_id_raw.stdout | trim }}"
            --region {{ verify_region }}
            --query 'InternetGateways[].InternetGatewayId'
            --output json
          register: aws_igw_raw
          changed_when: false

        - name: Parse IGW response
          set_fact:
            aws_igws: "{{ aws_igw_raw.stdout | from_json }}"

        - name: Query load balancers in the VPC
          shell: >
            aws elbv2 describe-load-balancers
            --region {{ verify_region }}
            --query "LoadBalancers[?VpcId=='{{ aws_vpc_id_raw.stdout | trim }}'].{Name:LoadBalancerName,Scheme:Scheme}"
            --output json
          register: aws_nlb_raw
          changed_when: false

        - name: Parse NLB response
          set_fact:
            aws_nlbs: "{{ aws_nlb_raw.stdout | from_json }}"

        - name: Assert cluster is private (no internet-facing LBs)
          assert:
            that:
              - aws_nlbs | selectattr('Scheme', 'equalto', 'internet-facing') | list | length == 0
            fail_msg: "FAIL: Found internet-facing load balancer(s) in VPC — cluster is not private"
            success_msg: "PASS: All load balancers are internal — cluster is private ({{ aws_nlbs | length }} LB(s))"

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: private_network
            fail_detail: "cluster is not private or could not verify VPC/LB configuration"

    # --- external_oidc ---
    - name: "CHECK: External OIDC (via OCM API)"
      block:
        - name: Assert external auth via OCM
          assert:
            that:
              - ocm_cluster.external_auth_config is defined
              - ocm_cluster.external_auth_config.enabled | default(false) | bool
            fail_msg: "FAIL: OCM external_auth_config not enabled"
            success_msg: "PASS: OCM confirms external auth is enabled"
          when: ocm_available
        - name: Assert externalAuthProviders via CRD (fallback)
          assert:
            that:
              - rcp.spec.enableExternalAuthProviders is defined
              - rcp.spec.enableExternalAuthProviders | bool
              - rcp.spec.externalAuthProviders is defined
              - rcp.spec.externalAuthProviders | length > 0
            fail_msg: "FAIL: externalAuthProviders not configured"
            success_msg: "PASS: externalAuthProviders configured (CRD fallback)"
          when: not ocm_available
        - name: Fail if neither check ran
          fail:
            msg: "BUG: neither OCM nor CRD check executed for external_oidc"
          when: ocm_available is not defined
        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: external_oidc
            fail_detail: "external OIDC auth not enabled (ocm_available={{ ocm_available | default('?') }})"

    # --- fips ---
    - name: "CHECK: FIPS Mode (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
      block:
        - name: Get AMI ID from cluster worker instance
          shell: >
            aws ec2 describe-instances
            --filters "Name=tag:kubernetes.io/cluster/{{ cluster_name }},Values=owned"
            "Name=instance-state-name,Values=running"
            --region {{ verify_region }}
            --query 'Reservations[0].Instances[0].ImageId'
            --output text
          register: aws_ami_id_raw
          changed_when: false

        - name: Get AMI description
          shell: >
            aws ec2 describe-images
            --image-ids {{ aws_ami_id_raw.stdout | trim }}
            --region {{ verify_region }}
            --query 'Images[0].{Name:Name,Description:Description}'
            --output json
          register: aws_ami_info_raw
          changed_when: false

        - name: Parse AMI info
          set_fact:
            aws_ami_info: "{{ aws_ami_info_raw.stdout | from_json }}"

        - name: Assert worker AMI is FIPS-enabled
          assert:
            that:
              - "'fips' in (aws_ami_info.Name | default('') | lower) or 'fips' in (aws_ami_info.Description | default('') | lower)"
            fail_msg: "FAIL: Worker AMI '{{ aws_ami_info.Name | default('unknown') }}' does not appear to be FIPS-enabled"
            success_msg: "PASS: Worker AMI is FIPS-enabled ({{ aws_ami_info.Name | default('') }})"

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: fips
            fail_detail: "worker AMI is not FIPS-enabled or could not be verified"

    # --- etcd_kms ---
    - name: "CHECK: ETCD KMS Encryption (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
        kms_arn: "{{ etcd_encryption_kms_arn | default(rcp.spec.etcdEncryptionKMSARN | default('')) }}"
      block:
        - name: Assert KMS ARN is provided
          assert:
            that:
              - kms_arn | length > 0
              - "kms_arn is match('^arn:aws:kms:')"
            fail_msg: "FAIL: etcdEncryptionKMSARN not set or not a valid KMS ARN"
            success_msg: "PASS: KMS ARN format valid"

        - name: Verify KMS key exists and is enabled in AWS
          shell: >
            aws kms describe-key
            --key-id {{ kms_arn }}
            --region {{ verify_region }}
            --query 'KeyMetadata.{Arn:Arn,Enabled:Enabled,State:KeyState}'
            --output json
          register: aws_kms_check
          changed_when: false

        - name: Parse KMS key response
          set_fact:
            aws_kms_key: "{{ aws_kms_check.stdout | from_json }}"

        - name: Assert KMS key is enabled and ARN matches
          assert:
            that:
              - aws_kms_key.Arn == kms_arn
              - aws_kms_key.Enabled | bool
              - aws_kms_key.State == 'Enabled'
            fail_msg: "FAIL: KMS key not found, disabled, or ARN mismatch (state={{ aws_kms_key.State | default('?') }})"
            success_msg: "PASS: KMS key exists and is enabled"

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: etcd_kms
            fail_detail: "KMS key not found or not enabled in AWS"

    # --- user_agent ---
    - name: "CHECK: User Agent"
      block:
        - name: Assert userAgent is set
          assert:
            that:
              - rcp.spec.userAgent is defined
              - rcp.spec.userAgent | length > 0
            fail_msg: "FAIL: userAgent not set"
            success_msg: "PASS: userAgent = {{ rcp.spec.userAgent }}"
        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: user_agent
            fail_detail: "userAgent is not set"

    # --- cluster_autoscaler_expander ---
    - name: "CHECK: Cluster Autoscaler Expander (via AWS CLI + CRD)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
        valid_expanders: ['LeastWaste', 'Priority', 'Random']
      block:
        - name: Query AWS Auto Scaling Groups for cluster
          shell: >
            aws autoscaling describe-auto-scaling-groups
            --filters "Name=tag:kubernetes.io/cluster/{{ cluster_name }},Values=owned"
            --region {{ verify_region }}
            --query 'AutoScalingGroups[].{Name:AutoScalingGroupName,Min:MinSize,Max:MaxSize}'
            --output json
          register: aws_asg_raw
          changed_when: false

        - name: Parse ASG response
          set_fact:
            aws_asgs: "{{ aws_asg_raw.stdout | from_json }}"

        - name: Assert ASGs exist and allow scaling
          assert:
            that:
              - aws_asgs | length > 0
              - aws_asgs[0].Max | int > aws_asgs[0].Min | int
            fail_msg: "FAIL: No ASGs found for cluster {{ cluster_name }} or MaxSize ({{ aws_asgs[0].Max | default('?') }}) == MinSize ({{ aws_asgs[0].Min | default('?') }})"
            success_msg: "PASS: {{ aws_asgs | length }} ASG(s) found, scaling enabled (min={{ aws_asgs[0].Min }}, max={{ aws_asgs[0].Max }})"

        - name: Assert expander strategy via CRD (not exposed in AWS)
          assert:
            that:
              - rcp.spec.autoscaler is defined
              - rcp.spec.autoscaler.expanders is defined
              - rcp.spec.autoscaler.expanders | length > 0
              - rcp.spec.autoscaler.expanders | difference(valid_expanders) | length == 0
              - "'LeastWaste' in rcp.spec.autoscaler.expanders"
            fail_msg: "FAIL: autoscaler expanders {{ rcp.spec.autoscaler.expanders | default([]) }}, expected LeastWaste"
            success_msg: "PASS: autoscaler.expanders = {{ rcp.spec.autoscaler.expanders }}"

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: cluster_autoscaler_expander
            fail_detail: "autoscaler not active in AWS or expander strategy not set"

    # --- image_registry ---
    - name: "CHECK: Image Registry Config (via OCM API)"
      vars:
        expected_domain: "{{ registry_domain | default('quay.io') }}"
      block:
        - name: Assert registry config via OCM
          assert:
            that:
              - ocm_cluster.registry_config is defined
              - ocm_cluster.registry_config.allowed_registries_for_import is defined
              - ocm_cluster.registry_config.allowed_registries_for_import | length > 0
            fail_msg: "FAIL: OCM registry_config not configured"
            success_msg: "PASS: OCM confirms registry config is set"
          when: ocm_available
        - name: Assert clusterRegistryConfig via CRD (fallback)
          assert:
            that:
              - rcp.spec.clusterRegistryConfig is defined
              - rcp.spec.clusterRegistryConfig.allowedRegistriesForImport is defined
              - rcp.spec.clusterRegistryConfig.allowedRegistriesForImport | length > 0
              - rcp.spec.clusterRegistryConfig.registrySources is defined
              - rcp.spec.clusterRegistryConfig.registrySources.allowedRegistries is defined
            fail_msg: "FAIL: clusterRegistryConfig missing or incomplete"
            success_msg: "PASS: clusterRegistryConfig structure present (CRD fallback)"
          when: not ocm_available
        - name: Fail if neither check ran
          fail:
            msg: "BUG: neither OCM nor CRD check executed for image_registry"
          when: ocm_available is not defined
        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: image_registry
            fail_detail: "registry config not set (ocm_available={{ ocm_available | default('?') }})"

    # --- additional_tags ---
    - name: "CHECK: Additional Tags (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
      block:
        - name: Query AWS for resources tagged with cluster-specific tags
          shell: >
            aws resourcegroupstaggingapi get-resources
            --tag-filters
            Key=env,Values={{ environment_tag | default('test') }}
            Key=purpose,Values={{ purpose_tag | default('rosa-hcp-automation-testing') }}
            Key=automated,Values=true
            --region {{ verify_region }}
            --query 'ResourceTagMappingList[0].Tags'
            --output json
          register: aws_tags_raw
          changed_when: false

        - name: Parse AWS tags response
          set_fact:
            aws_tags_list: "{{ aws_tags_raw.stdout | from_json }}"

        - name: Reset AWS tags dict
          set_fact:
            aws_tags: {}

        - name: Convert AWS tags to dict
          set_fact:
            aws_tags: "{{ aws_tags | combine({item.Key: item.Value}) }}"
          loop: "{{ aws_tags_list }}"

        - name: Assert default tags present on AWS resources
          assert:
            that:
              - aws_tags_list | length > 0
              - "'env' in aws_tags"
              - "'purpose' in aws_tags"
              - "'automated' in aws_tags"
            fail_msg: "FAIL: Default tags (env, purpose, automated) not found on AWS resources in {{ verify_region }}"
            success_msg: "PASS: Default tags present on AWS resources (env={{ aws_tags.env }}, purpose={{ aws_tags.purpose }}, automated={{ aws_tags.automated }})"

        - name: Assert custom tags present on AWS resources
          assert:
            that:
              - "'{{ item.key }}' in aws_tags"
              - "aws_tags[item.key] == item.value | string"
            fail_msg: "FAIL: Custom tag {{ item.key }}={{ item.value }} not found on AWS resources"
            success_msg: "PASS: Custom tag {{ item.key }}={{ item.value }} found on AWS resources"
          loop: "{{ additional_tags | default({}) | dict2items }}"
          when: additional_tags is defined and (additional_tags | length > 0)

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: additional_tags
            fail_detail: "default or custom tags not found on AWS resources"

    # --- domain_prefix ---
    - name: "CHECK: Domain Prefix (via OCM API)"
      vars:
        expected_prefix: "{{ domain_prefix | default(name_prefix | default(cluster_name | regex_replace('-rosa-hcp$', ''))) }}"
      block:
        - name: Assert domainPrefix via OCM
          assert:
            that:
              - ocm_cluster.domain_prefix is defined
              - ocm_cluster.domain_prefix | length > 0
              - ocm_cluster.domain_prefix | length <= 15
              - ocm_cluster.domain_prefix == expected_prefix
            fail_msg: "FAIL: OCM domain_prefix does not match expected"
            success_msg: "PASS: OCM confirms domain_prefix matches expected"
          when: ocm_available
        - name: Assert domainPrefix via CRD (fallback)
          assert:
            that:
              - rcp.spec.domainPrefix is defined
              - rcp.spec.domainPrefix | length > 0
              - rcp.spec.domainPrefix | length <= 15
              - rcp.spec.domainPrefix == expected_prefix
            fail_msg: "FAIL: domainPrefix does not match expected"
            success_msg: "PASS: domainPrefix matches expected (CRD fallback)"
          when: not ocm_available
        - name: Fail if neither check ran
          fail:
            msg: "BUG: neither OCM nor CRD check executed for domain_prefix"
          when: ocm_available is not defined
        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: domain_prefix
            fail_detail: "domainPrefix does not match expected '{{ expected_prefix }}'"

    # --- channel_group ---
    - name: "CHECK: Channel Group (via OCM API)"
      vars:
        expected_channel_group: "{{ channel_group | default(rcp.spec.channelGroup | default('stable')) }}"
        valid_channel_groups: ['stable', 'fast', 'candidate']
      block:
        - name: Assert channelGroup via OCM
          assert:
            that:
              - ocm_cluster.version.channel_group is defined
              - ocm_cluster.version.channel_group in valid_channel_groups
              - ocm_cluster.version.channel_group == expected_channel_group
            fail_msg: "FAIL: OCM channel_group does not match expected"
            success_msg: "PASS: OCM confirms channel_group matches expected"
          when: ocm_available
        - name: Assert channelGroup via CRD (fallback)
          assert:
            that:
              - rcp.spec.channelGroup is defined
              - rcp.spec.channelGroup in valid_channel_groups
              - rcp.spec.channelGroup == expected_channel_group
            fail_msg: "FAIL: channelGroup does not match expected"
            success_msg: "PASS: channelGroup matches expected (CRD fallback)"
          when: not ocm_available
        - name: Fail if neither check ran
          fail:
            msg: "BUG: neither OCM nor CRD check executed for channel_group"
          when: ocm_available is not defined
        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: channel_group
            fail_detail: "channelGroup does not match expected '{{ expected_channel_group }}'"

    # --- default_autoscaling ---
    - name: "CHECK: Default MachinePool Autoscaling (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
        expected_min: "{{ mp_min_replicas | default(2) | int }}"
        expected_max: "{{ mp_max_replicas | default(4 if (default_autoscaling | default(false) | bool) else 2) | int }}"
      block:
        - name: Query AWS ASG for default machine pool
          shell: >
            aws autoscaling describe-auto-scaling-groups
            --filters "Name=tag:kubernetes.io/cluster/{{ cluster_name }},Values=owned"
            --region {{ verify_region }}
            --query 'AutoScalingGroups[].{Name:AutoScalingGroupName,Min:MinSize,Max:MaxSize,Desired:DesiredCapacity}'
            --output json
          register: aws_asg_raw
          changed_when: false

        - name: Parse ASG response
          set_fact:
            aws_asgs: "{{ aws_asg_raw.stdout | from_json }}"

        - name: Assert ASG min/max match expected autoscaling range
          assert:
            that:
              - aws_asgs | length > 0
              - aws_asgs[0].Min | int == expected_min | int
              - aws_asgs[0].Max | int == expected_max | int
              - aws_asgs[0].Max | int >= aws_asgs[0].Min | int
            fail_msg: "FAIL: ASG min={{ aws_asgs[0].Min | default('?') }} max={{ aws_asgs[0].Max | default('?') }}, expected min={{ expected_min }} max={{ expected_max }}"
            success_msg: "PASS: ASG minSize={{ aws_asgs[0].Min }}, maxSize={{ aws_asgs[0].Max }} (matches expected min={{ expected_min }} max={{ expected_max }})"

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: default_autoscaling
            fail_detail: "ASG min/max do not match expected autoscaling range"

    # --- long cluster name (not a registry feature, always SKIP on failure) ---
    - name: "CHECK: Long Cluster Name"
      block:
        - name: Assert cluster name matches and check length
          assert:
            that:
              - rcp.spec.rosaClusterName is defined
              - rcp.spec.rosaClusterName == cluster_name
              - rcp.spec.rosaClusterName | length > 20
            fail_msg: "SKIP: cluster name '{{ rcp.spec.rosaClusterName | default('not set') }}' ({{ rcp.spec.rosaClusterName | default('') | length }} chars, expected '{{ cluster_name }}')"
            success_msg: "PASS: rosaClusterName = {{ rcp.spec.rosaClusterName }} ({{ rcp.spec.rosaClusterName | length }} chars, matches expected)"
        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - debug:
            msg: "SKIP: cluster name is not long (not a requestable feature)"
        - set_fact:
            features_skipped: "{{ features_skipped | int + 1 }}"

    # --- disk_size ---
    - name: "CHECK: Disk Volume Size (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
        expected_volume_size: "{{ root_volume_size | default(300) | int }}"
      block:
        - name: Query EC2 instances for cluster worker root volume size
          shell: >
            aws ec2 describe-instances
            --filters "Name=tag:kubernetes.io/cluster/{{ cluster_name }},Values=owned"
            "Name=instance-state-name,Values=running"
            --region {{ verify_region }}
            --query 'Reservations[0].Instances[0].BlockDeviceMappings[0].Ebs.VolumeId'
            --output text
          register: aws_volume_id_raw
          changed_when: false

        - name: Query EBS volume size
          shell: >
            aws ec2 describe-volumes
            --volume-ids {{ aws_volume_id_raw.stdout | trim }}
            --region {{ verify_region }}
            --query 'Volumes[0].Size'
            --output text
          register: aws_volume_size_raw
          changed_when: false

        - name: Assert root volume size matches expected
          assert:
            that:
              - aws_volume_size_raw.stdout | trim | int == expected_volume_size | int
            fail_msg: "FAIL: root volume size is {{ aws_volume_size_raw.stdout | trim }} GiB, expected {{ expected_volume_size }} GiB"
            success_msg: "PASS: root volume size = {{ aws_volume_size_raw.stdout | trim }} GiB (matches expected {{ expected_volume_size }})"

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: disk_size
            fail_detail: "root volume size does not match expected {{ expected_volume_size }} GiB"

    # --- parallel_upgrade ---
    - name: "CHECK: Parallel Node Upgrade (via OCM API)"
      vars:
        expected_max_surge: "{{ max_surge | default(1) | int }}"
        expected_max_unavailable: "{{ max_unavailable | default(0) | int }}"
      block:
        - name: Query OCM node pools for upgrade config
          uri:
            url: "{{ ocm_api_url }}/api/clusters_mgmt/v1/clusters/{{ ocm_cluster.id }}/node_pools"
            method: GET
            headers:
              Authorization: "Bearer {{ ocm_token_result.json.access_token }}"
              Accept: application/json
            status_code: 200
            timeout: 15
          register: ocm_node_pools_result
          failed_when: false
          changed_when: false
          when: ocm_available and ocm_cluster.id is defined

        - name: Assert node pool upgrade config via OCM
          assert:
            that:
              - ocm_node_pools_result.json.items | length > 0
              - ocm_node_pools_result.json.items[0].management_upgrade is defined
              - ocm_node_pools_result.json.items[0].management_upgrade.max_surge is defined
            fail_msg: "FAIL: OCM node pool upgrade config not set"
            success_msg: "PASS: OCM confirms node pool upgrade config is set"
          when: ocm_available and ocm_node_pools_result is defined and ocm_node_pools_result.json is defined

        - name: Assert updateConfig via CRD (fallback)
          assert:
            that:
              - rmp.spec.updateConfig is defined
              - rmp.spec.updateConfig.rollingUpdate is defined
              - rmp.spec.updateConfig.rollingUpdate.maxSurge | int == expected_max_surge | int
              - rmp.spec.updateConfig.rollingUpdate.maxUnavailable | int == expected_max_unavailable | int
            fail_msg: "FAIL: rollingUpdate does not match expected"
            success_msg: "PASS: rollingUpdate matches expected (CRD fallback)"
          when: not ocm_available or ocm_node_pools_result is not defined or ocm_node_pools_result.json is not defined

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: parallel_upgrade
            fail_detail: "node pool upgrade config not set"

    # --- security_groups ---
    - name: "CHECK: Additional Security Groups"
      vars:
        expected_sgs: "{{ additional_security_groups | default([]) }}"
      block:
        - name: Assert additionalSecurityGroups match requested
          assert:
            that:
              - rmp.spec.additionalSecurityGroups is defined
              - rmp.spec.additionalSecurityGroups | length > 0
              - rmp.spec.additionalSecurityGroups | sort == expected_sgs | sort
            fail_msg: "FAIL: additionalSecurityGroups is {{ rmp.spec.additionalSecurityGroups | default([]) }}, expected {{ expected_sgs }}"
            success_msg: "PASS: additionalSecurityGroups = {{ rmp.spec.additionalSecurityGroups }} (matches requested)"
          when: expected_sgs | length > 0
        - name: Assert additionalSecurityGroups exists (no expected list to compare)
          assert:
            that:
              - rmp.spec.additionalSecurityGroups is defined
              - rmp.spec.additionalSecurityGroups | length > 0
            fail_msg: "FAIL: additionalSecurityGroups not set"
            success_msg: "PASS: additionalSecurityGroups = {{ rmp.spec.additionalSecurityGroups }}"
          when: expected_sgs | length == 0
        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: security_groups
            fail_detail: "additionalSecurityGroups not set or does not match expected {{ expected_sgs }}"

    # --- availability_zones ---
    - name: "CHECK: Availability Zones (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
        stack_name: "{{ cluster_name }}-rosa-network-stack"
        expected_az_count: "{{ availability_zone_count | default(2) | int }}"
      block:
        - name: Query subnets created by CloudFormation stack
          shell: >
            aws ec2 describe-subnets
            --filters "Name=tag:aws:cloudformation:stack-name,Values={{ stack_name }}"
            --region {{ verify_region }}
            --query 'Subnets[].AvailabilityZone'
            --output json
          register: aws_subnet_azs_raw
          changed_when: false

        - name: Parse subnet AZs
          set_fact:
            aws_subnet_azs: "{{ aws_subnet_azs_raw.stdout | from_json | unique | sort }}"

        - name: Assert subnets span expected AZs
          assert:
            that:
              - aws_subnet_azs | length | int == expected_az_count | int
              - aws_subnet_azs | map('regex_search', '^' + verify_region) | select | list | length == aws_subnet_azs | length
            fail_msg: "FAIL: subnets span {{ aws_subnet_azs | length }} AZs {{ aws_subnet_azs }}, expected {{ expected_az_count }} in region {{ verify_region }}"
            success_msg: "PASS: subnets span {{ aws_subnet_azs | length }} AZs in {{ verify_region }} — {{ aws_subnet_azs }}"

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: availability_zones
            fail_detail: "subnets do not span expected {{ expected_az_count }} AZs in region {{ verify_region }}"

    # --- audit_logging ---
    - name: "CHECK: Log Forwarding (via AWS CLI)"
      vars:
        verify_region: "{{ aws_region | default(rcp.spec.region | default('us-west-2')) }}"
      block:
        - name: Verify CloudWatch IAM role exists in AWS
          shell: >
            aws iam get-role
            --role-name {{ log_forward_cloudwatch_role_arn | regex_replace('^.*/','') }}
            --query 'Role.Arn'
            --output text
          register: aws_cw_role_check
          changed_when: false
          when: log_forward_cloudwatch_role_arn is defined and (log_forward_cloudwatch_role_arn | length > 0)

        - name: Assert CloudWatch IAM role exists
          assert:
            that:
              - aws_cw_role_check.rc == 0
              - aws_cw_role_check.stdout | trim == log_forward_cloudwatch_role_arn
            fail_msg: "FAIL: CloudWatch IAM role not found in AWS"
            success_msg: "PASS: CloudWatch IAM role exists"
          when: log_forward_cloudwatch_role_arn is defined and (log_forward_cloudwatch_role_arn | length > 0)

        - name: Verify CloudWatch log group exists in AWS
          shell: >
            aws logs describe-log-groups
            --log-group-name-prefix {{ log_forward_cloudwatch_log_group }}
            --region {{ verify_region }}
            --query 'logGroups[?logGroupName==`{{ log_forward_cloudwatch_log_group }}`].logGroupName'
            --output text
          register: aws_cw_log_group_check
          changed_when: false
          when: log_forward_cloudwatch_log_group is defined and (log_forward_cloudwatch_log_group | length > 0)

        - name: Assert CloudWatch log group exists
          assert:
            that:
              - aws_cw_log_group_check.rc == 0
              - aws_cw_log_group_check.stdout | trim == log_forward_cloudwatch_log_group
            fail_msg: "FAIL: CloudWatch log group '{{ log_forward_cloudwatch_log_group }}' not found in {{ verify_region }}"
            success_msg: "PASS: CloudWatch log group exists"
          when: log_forward_cloudwatch_log_group is defined and (log_forward_cloudwatch_log_group | length > 0)

        - name: Verify S3 bucket exists in AWS
          shell: >
            aws s3api head-bucket
            --bucket {{ log_forward_s3_bucket }}
          register: aws_s3_bucket_check
          changed_when: false
          failed_when: false
          when: log_forward_s3_bucket is defined and (log_forward_s3_bucket | length > 0)

        - name: Assert S3 bucket exists
          assert:
            that:
              - aws_s3_bucket_check.rc == 0
            fail_msg: "FAIL: S3 bucket '{{ log_forward_s3_bucket }}' not found in AWS"
            success_msg: "PASS: S3 bucket '{{ log_forward_s3_bucket }}' exists"
          when: log_forward_s3_bucket is defined and (log_forward_s3_bucket | length > 0)

        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: audit_logging
            fail_detail: "log forwarding destinations not found in AWS"

    # --- proxy_enabled ---
    - name: "CHECK: Proxy Configuration"
      block:
        - name: Assert proxy is set
          assert:
            that:
              - rcp.spec.proxy is defined
            fail_msg: "FAIL: proxy not set"
            success_msg: "PASS: proxy configured"
        - set_fact:
            features_passed: "{{ features_passed | int + 1 }}"
      rescue:
        - include_tasks: "{{ playbook_dir }}/../tasks/verify_feature_rescue.yml"
          vars:
            feature_id: proxy_enabled
            fail_detail: "proxy is not set"

    # ================================================================
    # SUMMARY
    # ================================================================
    - name: Build passed features list
      set_fact:
        results_passed: "{{ requested_features_list | difference(results_warned | map('regex_replace', ':.*', '') | list) | difference(results_failed | map('regex_replace', ':.*', '') | list) }}"

    - name: Feature verification summary
      debug:
        msg: |

          ═══════════════════════════════════════════════════════════════
          FEATURE FLAG VERIFICATION SUMMARY
          ═══════════════════════════════════════════════════════════════

          Cluster: {{ cluster_name }}
          Namespace: {{ capi_namespace }}
          Cluster Version: {{ rcp.spec.version | default('unknown') }}
          OpenShift Version: {{ hub_ocp_version }}
          MCE Version: {{ mce_version }}
          CAPA Image: {{ capa_image }}
          Requested: {{ requested_features_list | join(', ') | default('none', true) }}

          ───────────────────────────────────────────────────────────────
          PASSED ({{ results_passed | length }}):
          {% for f in results_passed %}
            ✓ {{ f }}
          {% endfor %}
          {% if results_passed | length == 0 %}
            (none)
          {% endif %}

          {% if results_warned | length > 0 %}
          WARNED ({{ results_warned | length }}) — CRD does not support field:
          {% for w in results_warned %}
            ⚠ {{ w }}
          {% endfor %}

          {% endif %}
          {% if results_failed | length > 0 %}
          FAILED ({{ results_failed | length }}) — requested and CRD supports it, but missing:
          {% for f in results_failed %}
            ✗ {{ f }}
          {% endfor %}

          {% endif %}
          SKIPPED: {{ features_skipped }} (feature not requested — not an error)
          ═══════════════════════════════════════════════════════════════

    - name: Warn about CRD limitations
      debug:
        msg: "{{ results_warned | length }} feature(s) not supported by installed CRD version — platform limitation, not a test failure."
      when: results_warned | length > 0

    - name: Fail if any CRD-supported features are missing from spec
      fail:
        msg: >
          {{ results_failed | length }} requested feature(s) not found in cluster spec:
          {% for f in results_failed %}{{ f }}; {% endfor %}
      when: results_failed | length > 0
