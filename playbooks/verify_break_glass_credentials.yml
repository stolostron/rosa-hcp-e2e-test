---
- name: Verify break-glass credentials on ROSA HCP cluster
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/vars.yml
  vars:
    capi_namespace: "{{ capi_namespace | default('ns-rosa-hcp') }}"
    capa_system_namespace: "{{ capa_system_namespace | default('multicluster-engine') }}"
    break_glass_preflight_passed: false
    break_glass_credential_created: false
    break_glass_403_detected: false
    break_glass_root_cause: "unknown"
    break_glass_remediation_steps: []

  tasks:
    # ================================================================
    # SETUP: Login and get cluster resources
    # ================================================================
    - name: Set cluster credentials
      set_fact:
        ocp_user: "{{ OCP_HUB_CLUSTER_USER }}"
        ocp_password: "{{ OCP_HUB_CLUSTER_PASSWORD }}"
        api_url: "{{ OCP_HUB_API_URL }}"

    - name: Login to OpenShift Hub Cluster
      include_tasks: "{{ playbook_dir }}/../tasks/login_ocp.yml"

    - name: Validate cluster_name is provided
      fail:
        msg: "cluster_name is required. Pass it with -e cluster_name=<name>"
      when: cluster_name is not defined or cluster_name == ''

    - name: Validate cluster_id is provided
      fail:
        msg: "cluster_id is required (OCM cluster ID). Pass it with -e cluster_id=<ocm_id>"
      when: cluster_id is not defined or cluster_id == ''

    - name: Display test plan
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          Break-Glass Credentials Verification for: {{ cluster_name }}
          Cluster ID: {{ cluster_id }}
          Namespace: {{ capi_namespace }}
          CAPA System Namespace: {{ capa_system_namespace }}
          Force Test: {{ force_break_glass_test | default(false) | bool }}
          ═══════════════════════════════════════════════════════════════

    # ================================================================
    # PHASE 1 — PREFLIGHT
    # ================================================================
    - name: "PHASE 1 — Preflight checks"
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          PHASE 1 — Break-Glass Preflight Checks
          ═══════════════════════════════════════════════════════════════

    - name: Run break-glass preflight checks
      include_tasks: "{{ playbook_dir }}/../tasks/break_glass_preflight.yml"

    # ================================================================
    # PHASE 2 — BREAK-GLASS CREDENTIAL CREATION
    # ================================================================
    - name: "PHASE 2 — Break-glass credential creation"
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          PHASE 2 — Break-Glass Credential Creation
          ═══════════════════════════════════════════════════════════════
      when: break_glass_preflight_passed | default(false) | bool or force_break_glass_test | default(false) | bool

    - name: Attempt break-glass credential creation
      include_tasks: "{{ playbook_dir }}/../tasks/break_glass_create_credential.yml"
      when: break_glass_preflight_passed | default(false) | bool or force_break_glass_test | default(false) | bool

    # ================================================================
    # PHASE 3 — DIAGNOSE 403 (if detected)
    # ================================================================
    - name: "PHASE 3 — Diagnose 403 error"
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          PHASE 3 — Break-Glass 403 Error Diagnosis
          ═══════════════════════════════════════════════════════════════
      when: break_glass_403_detected | default(false) | bool

    - name: Run break-glass 403 diagnosis
      include_tasks: "{{ playbook_dir }}/../tasks/break_glass_diagnose_403.yml"
      when: break_glass_403_detected | default(false) | bool

    # ================================================================
    # FINAL SUMMARY
    # ================================================================
    - name: Break-glass verification summary
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          BREAK-GLASS CREDENTIALS VERIFICATION SUMMARY
          ═══════════════════════════════════════════════════════════════

          Cluster: {{ cluster_name }}
          Cluster ID: {{ cluster_id }}
          Namespace: {{ capi_namespace }}

          ───────────────────────────────────────────────────────────────
          RESULTS:
          {% if break_glass_preflight_passed | default(false) | bool %}
            ✓ Preflight checks: PASSED
          {% else %}
            ✗ Preflight checks: FAILED
          {% endif %}
          {% if break_glass_credential_created | default(false) | bool %}
            ✓ Credential creation: SUCCESS
          {% else %}
            ✗ Credential creation: FAILED
          {% endif %}
          {% if break_glass_403_detected | default(false) | bool %}
            ✗ 403 Error: DETECTED
          {% else %}
            ✓ 403 Error: NOT DETECTED
          {% endif %}

          {% if break_glass_403_detected | default(false) | bool %}
          ───────────────────────────────────────────────────────────────
          ROOT CAUSE ASSESSMENT:
          {{ break_glass_root_cause | default('unknown') }}

          {% if break_glass_remediation_steps | length > 0 %}
          REMEDIATION STEPS:
          {% for step in break_glass_remediation_steps %}
            {{ loop.index }}. {{ step }}
          {% endfor %}
          {% endif %}
          {% endif %}
          ═══════════════════════════════════════════════════════════════

    - name: Fail if 403 error was detected
      fail:
        msg: >
          Break-glass credential 403 error detected and diagnosed.
          Root cause: {{ break_glass_root_cause | default('unknown') }}
          {% if break_glass_remediation_steps | length > 0 %}
          Remediation required: {{ break_glass_remediation_steps | join('; ') }}
          {% endif %}
      when: break_glass_403_detected | default(false) | bool