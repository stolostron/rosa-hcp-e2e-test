---
# ================================================================
# Upgrade ROSA HCP Machine Pool Version
# ================================================================
# This playbook upgrades a ROSA HCP cluster's machine pool to
# the next available OpenShift version via the ROSAMachinePool
# spec.version patch.
#
# IMPORTANT: The machine pool version cannot exceed the control
# plane version. Upgrade the control plane first.
#
# Usage Examples:
#
# 1. Upgrade default pool to first available version (auto-detect):
#    ansible-playbook upgrade_rosa_machine_pool.yml \
#      -e cluster_name=my-cluster
#
# 2. Upgrade a specific pool to a specific version:
#    ansible-playbook upgrade_rosa_machine_pool.yml \
#      -e cluster_name=my-cluster \
#      -e pool_name=worker-pool \
#      -e requested_version=4.20.14
#
# 3. Via UI (Workflow Builder):
#    All configuration options are passed as extra_vars
# ================================================================

- name: Upgrade ROSA HCP Machine Pool
  hosts: localhost
  connection: local
  any_errors_fatal: true
  vars_files:
    - ../vars/vars.yml
    - ../vars/user_vars.yml

  tasks:
    - name: Set cluster credentials
      set_fact:
        ocp_user: "{{ OCP_HUB_CLUSTER_USER }}"
        ocp_password: "{{ OCP_HUB_CLUSTER_PASSWORD }}"
        api_url: "{{ OCP_HUB_API_URL }}"
        AUTOMATION_PATH: "{{ lookup('env', 'AUTOMATION_PATH') | default(playbook_dir + '/..', true) }}"

    - name: Set default namespace
      set_fact:
        capi_namespace: "ns-rosa-hcp"
      when: capi_namespace is not defined

    - name: Prepare ansible runner host
      include_tasks: ../tasks/prepare_ansible_runner.yml
      when: not skip_ansible_runner | default(false) | bool

    - name: Login to OCP cluster
      include_tasks: ../tasks/login_ocp.yml

    - name: Validate cluster_name is provided
      fail:
        msg: "cluster_name is required. Usage: -e cluster_name=my-cluster"
      when: cluster_name is not defined or cluster_name == ""

    - name: Discover machine pool name
      shell: |
        oc get rosamachinepool -n {{ capi_namespace }} \
          -l cluster.x-k8s.io/cluster-name={{ cluster_name }} \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo ""
      register: discovered_pool
      when: pool_name is not defined or pool_name == ""

    - name: Set pool name from discovery or parameter
      set_fact:
        pool_name: "{{ pool_name | default(discovered_pool.stdout | default('')) }}"

    - name: Validate pool_name is set
      fail:
        msg: |
          Could not determine machine pool name.
          Either pass -e pool_name=<name> or ensure the cluster has a ROSAMachinePool
          with label cluster.x-k8s.io/cluster-name={{ cluster_name }}
      when: pool_name == ""

    - name: Get ROSAMachinePool resource
      shell: |
        oc get rosamachinepool {{ pool_name }} -n {{ capi_namespace }} -o json
      register: rmp_resource
      failed_when: rmp_resource.rc != 0

    - name: Parse ROSAMachinePool details
      set_fact:
        rmp_data: "{{ rmp_resource.stdout | from_json }}"

    - name: Get current version
      set_fact:
        current_version: "{{ rmp_data.spec.version }}"
        available_upgrades: "{{ rmp_data.status.availableUpgrades | default([]) }}"
        pool_ready: "{{ rmp_data.status.ready | default(false) }}"

    - name: Validate pool is ready
      fail:
        msg: |
          Machine pool {{ pool_name }} is not in ready state.
          Current status: ready={{ pool_ready }}
          The machine pool must be fully provisioned before upgrading.
      when: not pool_ready | bool

    - name: Get control plane version
      shell: |
        oc get rosacontrolplane {{ cluster_name }} -n {{ capi_namespace }} \
          -o jsonpath='{.spec.version}' 2>/dev/null || echo "unknown"
      register: cp_version_result

    - name: Set control plane version
      set_fact:
        control_plane_version: "{{ cp_version_result.stdout }}"

    - name: Display current state
      debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════════╗
          ║       ROSA HCP Machine Pool Upgrade                         ║
          ╚═══════════════════════════════════════════════════════════════╝

          Cluster: {{ cluster_name }}
          Machine Pool: {{ pool_name }}
          Namespace: {{ capi_namespace }}
          Current Pool Version: {{ current_version }}
          Control Plane Version: {{ control_plane_version }}
          Available Upgrades: {{ available_upgrades | join(', ') if available_upgrades | length > 0 else 'None' }}

    - name: Validate available upgrades exist
      fail:
        msg: |
          No available upgrades for machine pool {{ pool_name }}.
          Current version: {{ current_version }}
          Control plane version: {{ control_plane_version }}
          The machine pool is already at the latest version or upgrade paths
          have not been populated yet. Check:
            oc get rosamachinepool {{ pool_name }} -n {{ capi_namespace }} -o jsonpath='{.status.availableUpgrades}'
      when: available_upgrades | length == 0

    - name: Set requested version (auto-detect first available)
      set_fact:
        requested_version: "{{ available_upgrades[0] }}"
      when: requested_version is not defined or requested_version == ""

    - name: Validate requested version is in available upgrades
      fail:
        msg: |
          Requested version {{ requested_version }} is not available.
          Available upgrades: {{ available_upgrades | join(', ') }}
      when: requested_version not in available_upgrades

    - name: Display upgrade plan
      debug:
        msg: |
          Upgrading ROSAMachinePool:
          • Cluster: {{ cluster_name }}
          • Pool: {{ pool_name }}
          • From: {{ current_version }}
          • To:   {{ requested_version }}
          • Control Plane: {{ control_plane_version }}

    - name: Patch ROSAMachinePool with new version
      shell: |
        oc patch rosamachinepool {{ pool_name }} -n {{ capi_namespace }} \
          --type=merge \
          -p '{"spec": {"version": "{{ requested_version }}"}}'
      register: patch_result
      failed_when: patch_result.rc != 0

    - name: Record patch time
      set_fact:
        patch_epoch: "{{ now(utc=true) | int }}"

    - name: Display patch result
      debug:
        msg: "Patch applied: {{ patch_result.stdout }}"

    - name: Wait for upgrade to begin
      shell: |
        oc get rosamachinepool {{ pool_name }} -n {{ capi_namespace }} \
          -o jsonpath='{.status.ready}'
      register: upgrade_status
      until: upgrade_status.stdout == "false" or upgrade_status.stdout == "true"
      retries: 10
      delay: 15
      failed_when: false
      changed_when: false

    - name: Wait for ROSAMachinePool upgrade to complete
      shell: |
        SPEC_VERSION=$(oc get rosamachinepool {{ pool_name }} -n {{ capi_namespace }} \
          -o jsonpath='{.spec.version}' 2>/dev/null || echo "unknown")
        READY=$(oc get rosamachinepool {{ pool_name }} -n {{ capi_namespace }} \
          -o jsonpath='{.status.ready}' 2>/dev/null || echo "false")
        REPLICAS=$(oc get rosamachinepool {{ pool_name }} -n {{ capi_namespace }} \
          -o jsonpath='{.status.replicas}' 2>/dev/null || echo "0")
        READY_REPLICAS=$(oc get rosamachinepool {{ pool_name }} -n {{ capi_namespace }} \
          -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
        UPGRADE_STATE=$(oc get rosamachinepool {{ pool_name }} -n {{ capi_namespace }} \
          -o jsonpath='{.status.conditions[?(@.type=="RosaMachinePoolUpgrading")].reason}' 2>/dev/null || echo "unknown")
        UPGRADING=$(oc get rosamachinepool {{ pool_name }} -n {{ capi_namespace }} \
          -o jsonpath='{.status.conditions[?(@.type=="RosaMachinePoolUpgrading")].status}' 2>/dev/null || echo "True")
        ELAPSED=$(( $(date +%s) - {{ patch_epoch }} ))
        MINS=$((ELAPSED / 60))
        SECS=$((ELAPSED % 60))
        echo "[${MINS}m${SECS}s] Upgrade progress: ready=${READY} replicas=${READY_REPLICAS}/${REPLICAS} state=${UPGRADE_STATE}" >&2
        echo "${UPGRADE_STATE}|${UPGRADING}|${READY}|${REPLICAS}|${READY_REPLICAS}"
      register: upgrade_check
      until: >
        upgrade_check.stdout is defined and
        upgrade_check.stdout.split('|')[0] == 'upgraded' and
        upgrade_check.stdout.split('|')[1] == 'False' and
        upgrade_check.stdout.split('|')[2] == 'true'
      retries: 120
      delay: 30
      failed_when: false
      changed_when: false

    - name: Parse final upgrade status
      set_fact:
        final_state: "{{ upgrade_check.stdout.split('|')[0] | default('unknown') }}"
        final_upgrading: "{{ upgrade_check.stdout.split('|')[1] | default('True') }}"
        final_ready: "{{ upgrade_check.stdout.split('|')[2] | default('false') }}"
        final_replicas: "{{ upgrade_check.stdout.split('|')[3] | default('0') }}"
        final_ready_replicas: "{{ upgrade_check.stdout.split('|')[4] | default('0') }}"

    - name: Verify upgrade completed successfully
      fail:
        msg: |
          ROSAMachinePool upgrade did not complete within 60 minutes.
          Pool: {{ pool_name }}
          Upgrade State: {{ final_state }}
          Ready: {{ final_ready }}
          Replicas: {{ final_replicas }} ({{ final_ready_replicas }} ready)
          Expected version: {{ requested_version }}

          Check upgrade status:
            oc describe rosamachinepool {{ pool_name }} -n {{ capi_namespace }}
      when: final_state != "upgraded" or final_ready | lower != "true"

    - name: Calculate total upgrade time
      set_fact:
        total_seconds: "{{ now(utc=true) | int - patch_epoch | int }}"

    - name: Display upgrade success
      debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════════╗
          ║       ✅  MACHINE POOL UPGRADE COMPLETE!                     ║
          ╚═══════════════════════════════════════════════════════════════╝

          Cluster: {{ cluster_name }}
          Machine Pool: {{ pool_name }}
          Previous Version: {{ current_version }}
          New Version: {{ requested_version }}
          Replicas: {{ final_replicas }} ({{ final_ready_replicas }} ready)
          Status: Ready
          Total Upgrade Time: {{ (total_seconds | int // 60) }}m {{ (total_seconds | int % 60) }}s

          Verify:
            oc get rosamachinepool {{ pool_name }} -n {{ capi_namespace }}
